<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Catalog Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; }
        .submenu.active { max-height: 500px; }
        /* Full Display List Styling */
        #productDisplay { transition: all 0.5s ease; opacity: 0; pointer-events: none; transform: translateY(20px); }
        #productDisplay.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-x-hidden">

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0f172a] z-[100] border-r border-blue-500/20 flex flex-col -translate-x-full">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-black text-blue-400 uppercase tracking-tighter">AirTech Catalog</h2>
            <button onclick="togglePanel()" class="text-slate-400 text-3xl">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/50 rounded-2xl border border-slate-800">
                <button onclick="toggleAccordion('hik-menu', 'hik-icon')" class="w-full flex items-center justify-between p-4">
                    <span class="text-xs font-black text-blue-400 uppercase">Hikvision Solutions</span>
                    <i class="fas fa-chevron-down text-[10px]" id="hik-icon"></i>
                </button>
                <div id="hik-menu" class="submenu">
                    <div class="px-4 pb-4 space-y-1 ml-4 border-l border-slate-800">
                        <button onclick="showProducts('Hikvision NVR System')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white transition">NVR System</button>
                        <button onclick="showProducts('Hikvision DVR System')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white transition">DVR System</button>
                        <button onclick="showProducts('Hikvision IP Outdoor')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white transition">IP Camera Outdoor</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-2xl border border-slate-800">
                <button onclick="toggleAccordion('dahua-menu', 'dahua-icon')" class="w-full flex items-center justify-between p-4">
                    <span class="text-xs font-black text-orange-400 uppercase">Dahua Technology</span>
                    <i class="fas fa-chevron-down text-[10px]" id="dahua-icon"></i>
                </button>
                <div id="dahua-menu" class="submenu">
                    <div class="px-4 pb-4 space-y-1 ml-4 border-l border-slate-800">
                        <button onclick="showProducts('Dahua NVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white transition">Dahua NVR</button>
                        <button onclick="showProducts('Dahua DVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white transition">Dahua DVR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main id="mainContent" class="min-h-screen p-6 flex flex-col items-center justify-center">
        <button onclick="togglePanel()" class="bg-blue-600 px-8 py-4 rounded-2xl font-black shadow-lg">OPEN CATALOG</button>
        
        <div id="productDisplay" class="fixed inset-0 bg-slate-900 z-[110] hidden flex-col p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 id="categoryTitle" class="text-3xl font-black text-blue-400 uppercase">Category</h3>
                <button onclick="closeProducts()" class="h-12 w-12 bg-slate-800 rounded-full text-2xl">&times;</button>
            </div>

            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>
    </main>

    <script>
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            panel.classList.toggle('-translate-x-full');
        }

        function toggleAccordion(menuId, iconId) {
            const menu = document.getElementById(menuId);
            const icon = document.getElementById(iconId);
            menu.classList.toggle('active');
            icon.style.transform = menu.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function showProducts(category) {
            const display = document.getElementById('productDisplay');
            const title = document.getElementById('categoryTitle');
            const grid = document.getElementById('productGrid');
            
            // Sidebar close karo
            togglePanel();
            
            // Setup Display
            title.innerText = category;
            display.classList.remove('hidden');
            setTimeout(() => display.classList.add('show'), 10);

            // Dummy Data (Aap yahan real data add kar sakte hain)
            let products = [
                { name: category + " Model A", price: "550 SAR", specs: "4K Resolution, AI Face detection" },
                { name: category + " Model B", price: "720 SAR", specs: "16 Channel, H.265+ Compression" },
                { name: category + " Pro Max", price: "1200 SAR", specs: "Dual Power, Night Vision Pro" }
            ];

            grid.innerHTML = products.map(p => `
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 hover:border-blue-500 transition">
                    <div class="w-full h-40 bg-slate-700 rounded-2xl mb-4 flex items-center justify-center">
                        <i class="fas fa-camera text-4xl text-slate-500"></i>
                    </div>
                    <h4 class="text-xl font-bold mb-2">${p.name}</h4>
                    <p class="text-slate-400 text-sm mb-4">${p.specs}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-blue-400 font-black">${p.price}</span>
                        <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Details</button>
                    </div>
                </div>
            `).join('');
        }

        function closeProducts() {
            const display = document.getElementById('productDisplay');
            display.classList.remove('show');
            setTimeout(() => display.classList.add('hidden'), 500);
        }
    </script>
</body>
</html>
