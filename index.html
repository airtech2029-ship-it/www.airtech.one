<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech VIP Catalog | Saudi Pro POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #cbd5e1; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: #fbbf24; }
        .vip-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; transition: 0.3s; }
        .vip-card:hover { border-color: #fbbf24; transform: translateY(-5px); }
        .submenu { display: none; transition: all 0.3s ease; }
        .submenu.active { display: block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="fixed inset-y-0 left-0 w-72 bg-slate-950 border-r border-slate-800 z-50 flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black italic tracking-tighter text-blue-500">AIRTECH <span class="gold-text">VIP</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Hafar Al Batin Branch</p>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <button onclick="toggleAccordion('hik-menu')" class="w-full flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-800 hover:border-blue-500 transition">
                <span class="text-[11px] font-black text-blue-400 uppercase tracking-widest">HIKVISION DS-SERIES</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="hik-menu" class="submenu pl-4 space-y-1">
                <a href="#" onclick="render('hikNvr')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• NVR SYSTEM</a>
                <a href="#" onclick="render('hikDvr')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• DVR SYSTEM</a>
                <a href="#" onclick="render('hikIpIn')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• IP CAMERAS</a>
                <a href="#" onclick="render('hikAnaIn')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• ANALOG CAMERAS</a>
            </div>

            <button onclick="toggleAccordion('dahua-menu')" class="w-full flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-800 hover:border-orange-500 transition">
                <span class="text-[11px] font-black text-orange-400 uppercase tracking-widest">DAHUA WIZSENSE</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="dahua-menu" class="submenu pl-4 space-y-1">
                <a href="#" onclick="render('dahuaNvr')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• NVR MODELS</a>
                <a href="#" onclick="render('dahuaDvr')" class="block p-2 text-[10px] font-bold text-slate-400 hover:text-white">• XVR MODELS</a>
            </div>

            <div class="pt-4 pb-2 text-[9px] font-bold text-slate-600 uppercase tracking-[0.2em] px-4">Wireless & Storage</div>
            <a href="#" onclick="render('ezviz')" class="flex items-center gap-3 p-3 text-[11px] font-bold text-slate-400 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-wifi text-emerald-500 w-4"></i> EZVIZ WIFI</a>
            <a href="#" onclick="render('imou')" class="flex items-center gap-3 p-3 text-[11px] font-bold text-slate-400 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-video text-orange-400 w-4"></i> IMOU WIFI</a>
            <a href="#" onclick="render('wdHdd')" class="flex items-center gap-3 p-3 text-[11px] font-bold text-slate-400 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-hdd text-purple-500 w-4"></i> HDD STORE</a>
            <a href="#" onclick="render('sandisk')" class="flex items-center gap-3 p-3 text-[11px] font-bold text-slate-400 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-sd-card text-red-500 w-4"></i> SANDISK MEMORY</a>
            <a href="#" onclick="render('tpLink')" class="flex items-center gap-3 p-3 text-[11px] font-bold text-slate-400 hover:bg-slate-900 rounded-lg transition"><i class="fas fa-network-wired text-pink-500 w-4"></i> NETWORK STORE</a>

            <div class="pt-10">
                <div onclick="render('billzest')" class="flex items-center justify-center gap-2 p-4 bg-yellow-500/10 rounded-2xl border border-yellow-500/30 cursor-pointer group">
                    <i class="fas fa-crown gold-text group-hover:scale-125 transition"></i>
                    <span class="text-[12px] font-black gold-text uppercase tracking-widest">BillZest VIP</span>
                </div>
            </div>
        </div>
    </div>

    <main class="ml-72 p-10">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 id="cat-title" class="text-3xl font-black text-white uppercase italic">SELECT CATEGORY</h2>
                <p class="text-slate-500 text-xs tracking-widest mt-1 uppercase">Ready to dispatch from Hafar Al Batin</p>
            </div>
            <div class="text-right">
                <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-widest">System Status</span>
                <span class="gold-text font-black">EN | AR ACTIVE</span>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        const catalog = {
            hikNvr: { title: "HIKVISION DS-NVR", items: [
                { name: 'DS-7604NI-K1', model: '4-CH 4K', price: '345', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7604NI-K1.png' },
                { name: 'DS-7608NI-K2', model: '8-CH 4K', price: '590', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7608NI-K2.png' },
                { name: 'DS-7716NI-K4', model: '16-CH 4K', price: '1150', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7700/7716NI-K4.png' }
            ]},
            hikDvr: { title: "HIKVISION DS-DVR", items: [
                { name: 'DS-7204HGHI-K1 (S)', model: '4-CH Audio', price: '195', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7204HGHI-K1.png' },
                { name: 'DS-7208HUHI-K1', model: '8-CH 5MP', price: '545', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7208HUHI-K1.png' }
            ]},
            dahuaNvr: { title: "DAHUA NVR WIZSENSE", items: [
                { name: 'NVR4104HS-I', model: '4-CH WizSense', price: '320', img: 'https://www.dahuasecurity.com/asset/upload/product/20191024/NVR4104HS-I.png' },
                { name: 'NVR4216-4KS2', model: '16-CH 4K Pro', price: '720', img: 'https://www.dahuasecurity.com/asset/upload/product/20180521/NVR4216-4KS2.png' }
            ]},
            ezviz: { title: "EZVIZ WIFI CAMERAS", items: [
                { name: 'Ezviz C6N 1080P', model: 'Indoor PT', price: '145', img: 'https://m.media-amazon.com/images/I/51uI4W7e+BL._AC_SL1000_.jpg' },
                { name: 'Ezviz C8C 360', model: 'Outdoor PTZ', price: '320', img: 'https://m.media-amazon.com/images/I/51Hk8y683RL._AC_SL1000_.jpg' }
            ]},
            imou: { title: "IMOU WIFI CAMERAS", items: [
                { name: 'Imou Ranger 2', model: 'Indoor 360', price: '125', img: 'https://m.media-amazon.com/images/I/51r7H5eLpSL._AC_SL1000_.jpg' },
                { name: 'Imou Cruiser 2', model: '4MP PTZ', price: '340', img: 'https://m.media-amazon.com/images/I/51BfK8-j9TL._AC_SL1000_.jpg' }
            ]},
            wdHdd: { title: "SURVEILLANCE HDD STORE", items: [
                { name: 'WD Purple 2TB', model: 'Surveillance', price: '265', img: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { name: 'WD Purple 10TB', model: 'Surveillance', price: '1280', img: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { name: 'Toshiba 4TB', model: 'Surveillance', price: '385', img: 'https://m.media-amazon.com/images/I/718vHn+R76L._AC_SL1500_.jpg' }
            ]},
            sandisk: { title: "SANDISK STORAGE", items: [
                { name: 'SanDisk Ultra 128GB', model: 'Micro SD', price: '75', img: 'https://m.media-amazon.com/images/I/617NnxA9dtL._AC_SL1500_.jpg' },
                { name: 'SanDisk 64GB HE', model: 'High Endurance', price: '65', img: 'https://m.media-amazon.com/images/I/61dYvI7vVpL._AC_SL1500_.jpg' }
            ]},
            tpLink: { title: "TP-LINK NETWORK", items: [
                { name: 'Archer C6', model: 'AC1200 Gigabit', price: '165', img: 'https://m.media-amazon.com/images/I/51M3fA68uCL._AC_SL1000_.jpg' },
                { name: 'TL-SG1008P', model: '8-Port POE+', price: '320', img: 'https://m.media-amazon.com/images/I/61r5f7H3bPL._AC_SL1500_.jpg' }
            ]},
            billzest: { title: "BILLZEST VIP POS", items: [
                { name: 'BillZest Pro', model: 'Video Integrated', price: 'CALL', img: 'https://cdn-icons-png.flaticon.com/512/5662/5662359.png' }
            ]}
        };

        function toggleAccordion(id) {
            document.querySelectorAll('.submenu').forEach(m => { if(m.id !== id) m.classList.remove('active'); });
            document.getElementById(id).classList.toggle('active');
        }

        function render(key) {
            const data = catalog[key];
            if(!data) return;
            document.getElementById('cat-title').innerText = data.title;
            const grid = document.getElementById('grid');
            grid.innerHTML = data.items.map(item => `
                <div class="vip-card rounded-3xl p-6 text-center group">
                    <img src="${item.img}" class="h-40 mx-auto mb-6 object-contain group-hover:scale-110 transition duration-500">
                    <h3 class="text-white font-black text-lg mb-1">${item.name}</h3>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-4">${item.model}</p>
                    <div class="flex justify-between items-center bg-slate-900/80 p-3 rounded-2xl border border-slate-800">
                        <span class="text-xs font-bold text-slate-400 uppercase">SAR</span>
                        <span class="gold-text font-black text-xl">${item.price}</span>
                    </div>
                </div>
            `).join('');
        }

        // Default Load
        render('hikNvr');
    </script>
</body>
</html>
