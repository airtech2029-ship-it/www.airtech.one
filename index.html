<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Premium Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Panel transition fix */
        #sidePanel { transition: transform 0.3s ease-in-out; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="bg-slate-50 relative overflow-x-hidden">

    <div id="sidePanel" class="fixed inset-y-0 left-0 w-72 bg-[#0f172a] text-white transform -translate-x-full z-[100] shadow-2xl p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-bold text-blue-400">PRODUCT LIST</h2>
            <button onclick="togglePanel()" class="text-2xl text-slate-400">&times;</button>
        </div>
        <nav class="space-y-6">
            <div>
                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Security</h4>
                <a href="#" class="block py-2 text-sm hover:text-blue-400"><i class="fas fa-camera mr-2"></i> CCTV Systems</a>
            </div>
            <div>
                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Business</h4>
                <a href="#" class="block py-2 text-sm hover:text-blue-400"><i class="fas fa-laptop mr-2"></i> BillZest POS</a>
            </div>
        </nav>
    </div>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/60 hidden z-[90]"></div>

    <div id="mainContent">
        <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center">
                    <button onclick="togglePanel()" class="text-xl text-slate-800 mr-4"><i class="fas fa-bars"></i></button>
                    <div class="text-xl font-bold text-blue-900 tracking-tighter uppercase">AirTech One</div>
                </div>
                <a href="https://wa.me/966500000000" class="bg-blue-600 text-white px-4 py-2 rounded-md font-bold text-sm">Consult</a>
            </div>
        </nav>

        <header class="hero-gradient text-white py-24 px-6 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">Smart Tech Solutions</h1>
            <p class="text-slate-300 mb-8 max-w-lg mx-auto">Hafar Al Batin's Leading CCTV & POS Provider.</p>
            <button onclick="togglePanel()" class="bg-blue-600 px-8 py-3 rounded-lg font-bold">Explore All Products</button>
        </header>

        <section class="py-16 container mx-auto px-6 grid md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <i class="fas fa-shield-alt text-3xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">CCTV Security</h3>
                <p class="text-slate-500 text-sm">Standard Installation starting from SAR 250.</p>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                <i class="fas fa-chart-line text-3xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">BillZest POS</h3>
                <p class="text-slate-500 text-sm">Professional Billing starting from SAR 135.</p>
            </div>
        </section>

        <footer class="py-10 text-center border-t border-slate-200">
            <p class="text-slate-400 text-xs tracking-widest">&copy; 2026 AirTech One</p>
        </footer>
    </div>

    <script>
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            const overlay = document.getElementById('overlay');
            const isHidden = panel.classList.contains('-translate-x-full');
            
            if (isHidden) {
                panel.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                panel.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
