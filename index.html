<!-- ===== CUSTOMER LOGIN / REGISTER MODAL ===== -->
<div id="auth-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
  <div style="background: linear-gradient(135deg, #1a0e00 0%, #2d1a00 100%); border: 2px solid #f5a623; border-radius: 24px; width: 90%; max-width: 420px; padding: 28px 20px; position: relative; box-shadow: 0 20px 60px rgba(245,166,35,0.3);">
    
    <!-- Close button -->
    <div onclick="closeAuthModal()" style="position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; color: #f5a623;">✕</div>
    
    <!-- Logo inside modal -->
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; letter-spacing: 2px;">
        <span style="background: linear-gradient(135deg, #7a3500, #5a2500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Air</span><span style="background: linear-gradient(135deg, #ffffff, #ffe0a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Tech</span>
      </div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); letter-spacing: 2px;">CUSTOMER PORTAL</div>
    </div>
    
    <!-- Tab buttons -->
    <div style="display: flex; gap: 8px; margin-bottom: 28px;">
      <button id="login-tab-btn" onclick="switchAuthTab('login')" style="flex: 1; background: #f5a623; color: #000; border: none; padding: 12px; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px; cursor: pointer; border-radius: 8px; letter-spacing: 1px;">LOGIN</button>
      <button id="register-tab-btn" onclick="switchAuthTab('register')" style="flex: 1; background: transparent; color: #f5a623; border: 2px solid #f5a623; padding: 12px; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px; cursor: pointer; border-radius: 8px; letter-spacing: 1px;">REGISTER</button>
    </div>
    
    <!-- Login Form -->
    <div id="login-form" style="display: block;">
      <div style="margin-bottom: 20px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">EMAIL</div>
        <input type="email" id="login-email" placeholder="your@email.com" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <div style="margin-bottom: 24px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">PASSWORD</div>
        <input type="password" id="login-password" placeholder="••••••••" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <button onclick="doLogin()" style="width: 100%; background: #f5a623; color: #000; border: none; padding: 16px; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px; cursor: pointer; border-radius: 8px; letter-spacing: 1px; margin-bottom: 16px;">LOGIN</button>
      <div style="text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3);">
        Don't have an account? <span onclick="switchAuthTab('register')" style="color: #f5a623; cursor: pointer; text-decoration: underline;">Register</span>
      </div>
    </div>
    
    <!-- Register Form -->
    <div id="register-form" style="display: none;">
      <div style="margin-bottom: 16px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">FULL NAME</div>
        <input type="text" id="reg-name" placeholder="John Doe" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <div style="margin-bottom: 16px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">EMAIL</div>
        <input type="email" id="reg-email" placeholder="your@email.com" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <div style="margin-bottom: 16px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">PHONE</div>
        <input type="tel" id="reg-phone" placeholder="+966 5X XXX XXXX" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <div style="margin-bottom: 16px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">PASSWORD</div>
        <input type="password" id="reg-password" placeholder="••••••••" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <div style="margin-bottom: 24px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(245,166,35,0.7); margin-bottom: 6px;">CONFIRM PASSWORD</div>
        <input type="password" id="reg-confirm" placeholder="••••••••" style="width: 100%; background: #221200; border: 1px solid rgba(245,166,35,0.3); color: #fff; padding: 14px; font-family: 'Space Grotesk', sans-serif; border-radius: 8px; outline: none; font-size: 14px;">
      </div>
      <button onclick="doRegister()" style="width: 100%; background: #f5a623; color: #000; border: none; padding: 16px; font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px; cursor: pointer; border-radius: 8px; letter-spacing: 1px; margin-bottom: 16px;">CREATE ACCOUNT</button>
      <div style="text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3);">
        Already have an account? <span onclick="switchAuthTab('login')" style="color: #f5a623; cursor: pointer; text-decoration: underline;">Login</span>
      </div>
    </div>
  </div>
</div>

<!-- ===== CUSTOMER LOGIN FUNCTIONS ===== -->
<script>
// User database in localStorage
if (!localStorage.getItem('users')) {
  localStorage.setItem('users', JSON.stringify([]));
}

// Current logged in user
let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

function openAuthModal(tab) {
  document.getElementById('auth-modal').style.display = 'flex';
  switchAuthTab(tab);
}

function closeAuthModal() {
  document.getElementById('auth-modal').style.display = 'none';
}

function switchAuthTab(tab) {
  if (tab === 'login') {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('login-tab-btn').style.background = '#f5a623';
    document.getElementById('login-tab-btn').style.color = '#000';
    document.getElementById('register-tab-btn').style.background = 'transparent';
    document.getElementById('register-tab-btn').style.color = '#f5a623';
  } else {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
    document.getElementById('login-tab-btn').style.background = 'transparent';
    document.getElementById('login-tab-btn').style.color = '#f5a623';
    document.getElementById('register-tab-btn').style.background = '#f5a623';
    document.getElementById('register-tab-btn').style.color = '#000';
  }
}

function doRegister() {
  let name = document.getElementById('reg-name').value.trim();
  let email = document.getElementById('reg-email').value.trim();
  let phone = document.getElementById('reg-phone').value.trim();
  let pass = document.getElementById('reg-password').value;
  let confirm = document.getElementById('reg-confirm').value;
  
  if (!name || !email || !phone || !pass || !confirm) {
    alert('Please fill in all fields');
    return;
  }
  
  if (pass !== confirm) {
    alert('Passwords do not match');
    return;
  }
  
  if (pass.length < 6) {
    alert('Password must be at least 6 characters');
    return;
  }
  
  let users = JSON.parse(localStorage.getItem('users'));
  
  if (users.find(u => u.email === email)) {
    alert('Email already registered');
    return;
  }
  
  let newUser = {
    id: Date.now(),
    name: name,
    email: email,
    phone: phone,
    password: pass // In real app, hash this!
  };
  
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  
  // Auto login
  localStorage.setItem('currentUser', JSON.stringify(newUser));
  currentUser = newUser;
  
  closeAuthModal();
  updateAuthUI();
  
  alert('Registration successful! Welcome ' + name);
}

function doLogin() {
  let email = document.getElementById('login-email').value.trim();
  let pass = document.getElementById('login-password').value;
  
  if (!email || !pass) {
    alert('Please enter email and password');
    return;
  }
  
  let users = JSON.parse(localStorage.getItem('users'));
  let user = users.find(u => u.email === email && u.password === pass);
  
  if (!user) {
    alert('Invalid email or password');
    return;
  }
  
  localStorage.setItem('currentUser', JSON.stringify(user));
  currentUser = user;
  
  closeAuthModal();
  updateAuthUI();
  
  alert('Welcome back, ' + user.name + '!');
}

function doLogout() {
  localStorage.removeItem('currentUser');
  currentUser = null;
  updateAuthUI();
}

function updateAuthUI() {
  let loggedOutDiv = document.getElementById('auth-logged-out');
  let loggedInDiv = document.getElementById('auth-logged-in');
  let userNameSpan = document.getElementById('auth-user-name');
  let avatar = document.getElementById('auth-avatar');
  
  if (currentUser) {
    loggedOutDiv.style.display = 'none';
    loggedInDiv.style.display = 'flex';
    userNameSpan.textContent = currentUser.name.split(' ')[0];
    avatar.textContent = currentUser.name.charAt(0).toUpperCase();
  } else {
    loggedOutDiv.style.display = 'flex';
    loggedInDiv.style.display = 'none';
  }
}

// Initialize UI on page load
updateAuthUI();
</script>
