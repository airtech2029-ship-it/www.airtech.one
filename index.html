<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillZest VIP | AirTech One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .side-panel { transition: transform 0.4s ease; background: #0d1117; }
        .vip-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 18px; transition: 0.3s; height: 100%; display: flex; flex-direction: column; position: relative; }
        .vip-card:hover { border-color: #bf953f; transform: translateY(-5px); }
        .img-container { width: 100%; height: 160px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { max-height: 85%; max-width: 85%; object-fit: contain; }
    </style>
</head>
<body>

    <nav class="p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md border-b border-zinc-800 z-50">
        <button onclick="togglePanel()" class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 text-yellow-500 shadow-lg">
            <i class="fas fa-bars text-xl"></i>
        </button>
        <div class="text-2xl font-black italic uppercase"><span class="gold-text">BILLZEST</span> VIP</div>
        <div class="w-12"></div>
    </nav>

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-80 border-r border-zinc-800 -translate-x-full flex flex-col z-[100] shadow-2xl">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black">
            <h2 class="text-xl font-black gold-text italic">AIRTECH ONE</h2>
            <button onclick="togglePanel()" class="text-4xl text-zinc-600">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <div>
                <p class="text-[10px] font-black text-blue-500 mb-2 uppercase tracking-widest px-2">Hikvision</p>
                <div class="flex flex-col gap-1">
                    <button onclick="openProducts('hikNvr')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">NVR Systems</button>
                    <button onclick="openProducts('hikIpIn')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">IP Indoor Camera</button>
                    <button onclick="openProducts('hikIpOut')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">IP Outdoor Camera</button>
                    <button onclick="openProducts('hikAna')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">Analog Cameras</button>
                </div>
            </div>

            <div>
                <p class="text-[10px] font-black text-orange-500 mb-2 uppercase tracking-widest px-2">Dahua</p>
                <div class="flex flex-col gap-1">
                    <button onclick="openProducts('dahuaDvr')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">DVR Recorders</button>
                    <button onclick="openProducts('dahuaIp')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">IP Solutions</button>
                    <button onclick="openProducts('dahuaAna')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">Analog Camera</button>
                </div>
            </div>

            <div>
                <p class="text-[10px] font-black text-purple-500 mb-2 uppercase tracking-widest px-2">Storage & Net</p>
                <div class="flex flex-col gap-1">
                    <button onclick="openProducts('wdHdd')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">HDD (WD Purple)</button>
                    <button onclick="openProducts('tpLink')" class="text-left p-3 rounded-xl hover:bg-zinc-800 text-sm font-bold text-zinc-400 hover:text-white transition-all">Network (TP-Link)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="fullView" class="fixed inset-0 bg-black z-[200] hidden flex-col">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black/50 sticky top-0">
            <button onclick="closeFullView()" class="text-yellow-500 font-bold flex items-center gap-2"><i class="fas fa-arrow-left"></i> BACK</button>
            <h2 id="catTitle" class="text-xl font-black italic gold-text">CATALOG</h2>
            <span></span>
        </div>
        <div id="productGrid" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto pb-32"></div>
    </div>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/90 hidden z-[90] backdrop-blur-sm"></div>

    <script>
        const catalog = {
            // HIKVISION DATA
            hikNvr: { title: "HIKVISION NVR", items: [
                { model: 'DS-7104NI-Q1', name: '4-CH Mini NVR', price: 310, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'DS-7608NI-K2', name: '8-CH 4K Pro NVR', price: 585, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'DS-7732NI-K4', name: '32-CH Pro NVR', price: 1450, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' }
            ]},
            hikIpIn: { title: "HIK IP INDOOR", items: [
                { model: 'DS-2CD1123G0', name: '2MP IP Dome Indoor', price: 165, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' },
                { model: 'DS-2CD1323G0', name: '2MP Turret IP Camera', price: 175, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' }
            ]},
            hikIpOut: { title: "HIK IP OUTDOOR", items: [
                { model: 'DS-2CD1023G0', name: '2MP IP Bullet Outdoor', price: 185, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' },
                { model: 'DS-2CD2043G0', name: '4MP 4K IP Bullet', price: 340, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' }
            ]},
            hikAna: { title: "HIK ANALOG CAMERAS", items: [
                { model: 'DS-2CE56D0T', name: '2MP Analog Dome', price: 75, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' },
                { model: 'DS-2CE16D0T', name: '2MP Analog Bullet', price: 80, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' }
            ]},

            // DAHUA DATA
            dahuaDvr: { title: "DAHUA DVR", items: [
                { model: 'XVR5104HS-4KL', name: '4-CH 4K WizSense', price: 390, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' },
                { model: 'XVR5108HS-4KL', name: '8-CH 4K WizSense', price: 595, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' }
            ]},
            dahuaIp: { title: "DAHUA IP CAMERA", items: [
                { model: 'IPC-HDBW1230E', name: '2MP IP Dome IR', price: 195, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' },
                { model: 'IPC-HFW1431S', name: '4MP IP Bullet Outdoor', price: 280, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' }
            ]},
            dahuaAna: { title: "DAHUA ANALOG", items: [
                { model: 'HAC-HDW1200M', name: '2MP Analog Dome', price: 85, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' },
                { model: 'HAC-HFW1200R', name: '2MP Analog Bullet', price: 90, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' }
            ]},

            // HDD & NETWORK
            wdHdd: { title: "WD PURPLE STORAGE", items: [
                { model: 'WD20PURZ', name: '2TB WD Purple', price: 275, img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' },
                { model: 'WD40PURZ', name: '4TB WD Purple', price: 415, img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' },
                { model: 'WD60PURZ', name: '6TB WD Purple', price: 680, img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' }
            ]},
            tpLink: { title: "TP-LINK NETWORK", items: [
                { model: 'TL-WR840N', name: '300Mbps Router', price: 95, img: 'https://m.media-amazon.com/images/I/51vI-E9T3cL._AC_SL1500_.jpg' },
                { model: 'LS1008G', name: '8-Port Gigabit Switch', price: 110, img: 'https://m.media-amazon.com/images/I/51vI-E9T3cL._AC_SL1500_.jpg' }
            ]}
        };

        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function openProducts(key) {
            const data = catalog[key] || { title: "NO DATA", items: [] };
            document.getElementById('catTitle').innerText = data.title;
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.items.map(item => `
                <div class="vip-card">
                    <span class="text-[9px] text-zinc-500 font-black mb-3 uppercase tracking-widest">${item.model}</span>
                    <div class="img-container"><img src="${item.img}" class="product-img"></div>
                    <h3 class="text-white font-bold text-[12px] uppercase mt-4 h-8 overflow-hidden">${item.name}</h3>
                    <div class="mt-auto pt-4 border-t border-zinc-800 flex justify-between items-center">
                        <span class="text-lg font-black gold-text">${(item.price * 0.98).toFixed(0)} <small class="text-[8px] text-zinc-500">SAR</small></span>
                        <a href="https://wa.me/966500000000" class="text-green-500 text-xl"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>`).join('');
            document.getElementById('fullView').style.display = 'flex';
            if(!document.getElementById('sidePanel').classList.contains('-translate-x-full')) togglePanel();
        }

        function closeFullView() { document.getElementById('fullView').style.display = 'none'; }
    </script>
</body>
</html>
