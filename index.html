<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Hafar Al Batin VIP Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a1120; color: white; overflow-x: hidden; }
        .side-panel { transition: transform 0.3s ease-in-out; }
        .vip-card { background: #161e31; border: 1px solid #232d45; border-radius: 20px; padding: 18px; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .vip-card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-container { width: 100%; height: 180px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 15px; position: relative; }
        .product-img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .discount-tag { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; z-index: 10; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-[#0a1120]/90 backdrop-blur-md border-b border-slate-900 z-50">
        <button onclick="togglePanel()" class="w-10 h-10 bg-slate-900 rounded-lg flex items-center justify-center border border-slate-800 text-blue-500"><i class="fas fa-bars"></i></button>
        <div class="text-xl font-black italic uppercase">AIRTECH <span class="text-blue-600">ONE</span></div>
        <div class="w-10"></div>
    </nav>

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0d1629] z-[100] border-r border-slate-800 -translate-x-full flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-black text-blue-500 italic uppercase">AIRTECH MENU</h2>
            <button onclick="togglePanel()" class="text-3xl text-slate-500">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/40 rounded-2xl border border-slate-800 p-2">
                <p class="text-[10px] font-black text-blue-500 px-3 py-2 uppercase tracking-widest">Hikvision Solutions</p>
                <div class="flex flex-col ml-2 border-l border-blue-500/20 text-[11px] font-bold text-slate-400">
                    <a href="#" onclick="openProducts('hikNvr')" class="p-3">NVR SYSTEM</a>
                    <a href="#" onclick="openProducts('hikDvr')" class="p-3">DVR SYSTEM</a>
                    <a href="#" onclick="openProducts('hikIpIn')" class="p-3">IP CAMERA INDOOR</a>
                    <a href="#" onclick="openProducts('hikIpOut')" class="p-3">IP CAMERA OUTDOOR</a>
                    <a href="#" onclick="openProducts('ezviz')" class="p-3 text-blue-400 italic">EZVIZ WI-FI</a>
                </div>
            </div>
            <div class="bg-slate-900/40 rounded-2xl border border-slate-800 p-2">
                <p class="text-[10px] font-black text-orange-500 px-3 py-2 uppercase tracking-widest">Dahua Technology</p>
                <div class="flex flex-col ml-2 border-l border-orange-500/20 text-[11px] font-bold text-slate-400">
                    <a href="#" onclick="openProducts('dahuaNvr')" class="p-3">NVR SYSTEM</a>
                    <a href="#" onclick="openProducts('dahuaDvr')" class="p-3">DVR SYSTEM</a>
                    <a href="#" onclick="openProducts('imou')" class="p-3 text-orange-400 italic">IMOU WI-FI</a>
                </div>
            </div>
            <div class="bg-slate-900/40 rounded-2xl border border-slate-800 p-2">
                <p class="text-[10px] font-black text-purple-500 px-3 py-2 uppercase tracking-widest">Storage & Others</p>
                <div class="flex flex-col ml-2 border-l border-purple-500/20 text-[11px] font-bold text-slate-400">
                    <a href="#" onclick="openProducts('wdHdd')" class="p-3">SURVEILLANCE HDD</a>
                    <a href="#" onclick="openProducts('tapo')" class="p-3 text-purple-400 italic">TAPO SMART</a>
                </div>
            </div>
        </div>
    </div>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl font-black uppercase italic tracking-tighter leading-tight">PREMIUM<br><span class="text-blue-600">A2Z SECURITY</span></h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[4px] mt-4">Hafar Al Batin • Saudi Pro POS</p>
    </header>

    <div id="fullView" class="fixed inset-0 bg-[#0a1120] z-[200] hidden flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0d1629]">
            <h2 id="catTitle" class="text-xl font-black uppercase italic text-blue-500">Products</h2>
            <button onclick="closeFullView()" class="text-4xl">&times;</button>
        </div>
        <div id="productGrid" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto pb-20"></div>
    </div>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/80 hidden z-[90] backdrop-blur-sm"></div>

    <script>
        const catalog = {
            hikNvr: { title: "HIKVISION NVR (A2Z)", items: [
                { model: 'DS-7604NI-K1', name: '4-CH 4K Network Recorder', price: 420, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'DS-7608NI-K2', name: '8-CH 4K Professional NVR', price: 585, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'DS-7616NI-K2', name: '16-CH 4K Network Recorder', price: 850, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'DS-7732NI-K4', name: '32-CH 4K High-End NVR', price: 1450, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' }
            ]},
            hikDvr: { title: "HIKVISION DVR (A2Z)", items: [
                { model: 'DS-7204HGHI', name: '4-CH Turbo HD DVR', price: 245, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' },
                { model: 'DS-7208HUHI', name: '8-CH 4K (8MP) Turbo DVR', price: 620, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' },
                { model: 'DS-7216HQHI', name: '16-CH 4MP Turbo DVR', price: 780, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' }
            ]},
            hikIpIn: { title: "HIKVISION IP INDOOR", items: [
                { model: 'DS-2CD1123G0', name: '2MP Dome IP Camera', price: 165, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' },
                { model: 'DS-2CD2183G2', name: '8MP (4K) UHD Dome Cam', price: 450, img: 'https://m.media-amazon.com/images/I/51-mB4n8k1L._AC_SL1000_.jpg' }
            ]},
            hikIpOut: { title: "HIKVISION IP OUTDOOR", items: [
                { model: 'DS-2CD1023G0', name: '2MP Bullet IP Camera', price: 175, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' },
                { model: 'DS-2CD2083G2', name: '8MP (4K) UHD Bullet', price: 490, img: 'https://m.media-amazon.com/images/I/51p-Vp8C+GL._AC_SL1500_.jpg' }
            ]},
            dahuaNvr: { title: "DAHUA NVR (A2Z)", items: [
                { model: 'NVR4108HS', name: '8-CH 4K Compact NVR', price: 540, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { model: 'NVR5216-4K', name: '16-CH 4K Pro NVR', price: 890, img: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' }
            ]},
            dahuaDvr: { title: "DAHUA DVR (A2Z)", items: [
                { model: 'XVR5108HS-4KL', name: '8-CH 4K WizSense DVR', price: 595, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' },
                { model: 'XVR5116HS-I3', name: '16-CH WizSense DVR', price: 790, img: 'https://m.media-amazon.com/images/I/51p8I+Yp9qL._AC_SL1000_.jpg' }
            ]},
            ezviz: { title: "EZVIZ WI-FI RANGE", items: [
                { model: 'C6N 4MP', name: 'Smart Indoor Pan/Tilt', price: 175, img: 'https://m.media-amazon.com/images/I/51M6X6N0FRL._AC_SL1500_.jpg' },
                { model: 'H8C 2K', name: '360° Outdoor Pan/Tilt', price: 295, img: 'https://m.media-amazon.com/images/I/51Hk6l+f6KL._AC_SL1500_.jpg' }
            ]},
            imou: { title: "IMOU WI-FI RANGE", items: [
                { model: 'Ranger 2', name: 'Indoor 360° Wi-Fi Cam', price: 145, img: 'https://m.media-amazon.com/images/I/51y8S5Q9p8L._AC_SL1500_.jpg' },
                { model: 'Cruiser 2 5MP', name: '5MP Pan/Tilt Outdoor', price: 340, img: 'https://m.media-amazon.com/images/I/61S-U8S3GvL._AC_SL1500_.jpg' }
            ]},
            wdHdd: { title: "SURVEILLANCE HDD", items: [
                { model: '2TB Purple', name: 'WD Surveillance HDD', price: 275, img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' },
                { model: '4TB Purple', name: 'WD Surveillance HDD', price: 415, img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' }
            ]},
            tapo: { title: "TAPO SMART RANGE", items: [
                { model: 'Tapo C200', name: 'Home Pan/Tilt Cam', price: 125, img: 'https://m.media-amazon.com/images/I/51N-D3U5k8L._AC_SL1000_.jpg' },
                { model: 'Tapo C310', name: 'Outdoor Wi-Fi Camera', price: 195, img: 'https://m.media-amazon.com/images/I/51vI-E9T3cL._AC_SL1500_.jpg' }
            ]}
        };

        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function openProducts(key) {
            const data = catalog[key] || { title: "Coming Soon", items: [] };
            document.getElementById('catTitle').innerText = data.title;
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.items.map(i => {
                const discounted = (i.price * 0.98).toFixed(2);
                return `
                <div class="vip-card">
                    <span class="text-[9px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-md font-black mb-3 w-fit tracking-widest">${i.model}</span>
                    <div class="img-container">
                        <div class="discount-tag">2% OFF</div>
                        <img src="${i.img}" alt="${i.name}" class="product-img">
                    </div>
                    <h3 class="text-white font-bold text-[13px] uppercase mt-4 text-center h-10 flex items-center leading-tight tracking-tight">${i.name}</h3>
                    <div class="w-full mt-auto flex justify-between items-center border-t border-slate-800 pt-4">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-500 line-through">${i.price} SAR</span>
                            <span class="text-xl font-black text-white">${discounted} <small class="text-[9px] text-blue-500 font-bold tracking-widest">SAR</small></span>
                        </div>
                        <a href="https://wa.me/966500000000" class="w-10 h-10 bg-green-600/20 text-green-500 border border-green-500/20 rounded-xl flex items-center justify-center hover:bg-green-600 hover:text-white transition-all"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('fullView').style.display = 'flex';
            togglePanel();
        }
        function closeFullView() { document.getElementById('fullView').style.display = 'none'; }
    </script>
</body>
</html>
