<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRTECH ONE | MASTER CATALOG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');
        body { background-color: #05070a; color: #ffffff; font-family: 'Inter', sans-serif; }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; background: #0a0f1d; }
        .menu-hidden { transform: translateX(-100%); }
        .product-card { background: #0f172a; border-radius: 2.5rem; border: 1px solid #1e293b; padding: 25px; transition: 0.3s; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .title-glow { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: -1px; }
        /* Brand Themes */
        .hik-theme { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .dah-theme { color: #f97316; text-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }
        .sandisk-theme { color: #ef4444; }
        .storage-theme { color: #a855f7; }
        .tp-theme { color: #ec4899; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#0a0f1d] border-b border-slate-900 sticky top-0 z-50">
        <button onclick="toggleMenu()" class="p-3 bg-slate-900 rounded-xl border border-slate-800">
            <i class="fas fa-bars text-blue-500"></i>
        </button>
        <div class="text-center italic font-black text-2xl tracking-tighter uppercase">
            AIRTECH <span class="text-blue-600">ONE</span>
        </div>
        <div class="flex gap-2">
            <button class="text-[10px] bg-slate-900 px-3 py-2 rounded-lg border border-slate-800 text-slate-400 font-bold uppercase">العربية</button>
        </div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-80 p-6 menu-hidden shadow-2xl overflow-y-auto border-r border-slate-800">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h2 class="text-blue-500 font-black italic text-xl uppercase tracking-tighter">AIRTECH MENU</h2>
            <button onclick="toggleMenu()" class="text-slate-500 text-3xl">&times;</button>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-900/40 p-5 rounded-3xl border border-slate-800">
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Hikvision Solutions</p>
                <button onclick="render('hik')" class="block w-full text-left py-2 text-sm font-bold text-slate-300">HIKVISION DVR/NVR</button>
                <button onclick="render('ezviz')" class="block w-full text-left py-2 text-sm font-bold text-blue-400 italic">EZVIZ WI-FI CAMERA</button>
            </div>

            <div class="bg-slate-900/40 p-5 rounded-3xl border border-slate-800">
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-3">Dahua Technology</p>
                <button onclick="render('dah')" class="block w-full text-left py-2 text-sm font-bold text-slate-300">DAHUA DVR/NVR</button>
                <button onclick="render('imou')" class="block w-full text-left py-2 text-sm font-bold text-orange-400 italic uppercase">IMOU WI-FI CAMERA</button>
            </div>

            <div class="bg-slate-900/40 p-5 rounded-3xl border border-slate-800">
                <p class="text-[9px] font-black text-purple-500 uppercase tracking-widest mb-3">Storage & Network</p>
                <button onclick="render('hdd')" class="block w-full text-left py-2 text-sm font-bold text-slate-300">TOSHIBA / WD PURPLE</button>
                <button onclick="render('sandisk')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 uppercase">SanDisk Memory</button>
                <button onclick="render('tp')" class="block w-full text-left py-2 text-sm font-bold text-purple-400 italic">TP-LINK ROUTERS</button>
            </div>

            <button onclick="render('bill')" class="w-full p-5 bg-blue-600/10 rounded-2xl border border-blue-500/20 flex items-center justify-center gap-3 mt-6 hover:bg-blue-600/20 transition">
                <i class="fas fa-crown text-blue-500"></i>
                <span class="text-xs font-black text-blue-400 uppercase tracking-widest">BillZest VIP POS</span>
            </button>
        </div>
    </div>

    <main class="p-6">
        <div id="hero" class="py-24 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter leading-none mb-4">AIRTECH<br><span class="text-blue-600">ONE</span></h1>
            <p class="text-slate-500 text-xs tracking-[0.4em] uppercase font-black">Hafar Al Batin Specialist</p>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

        <footer class="mt-20 py-10 text-center border-t border-slate-900">
            <p class="text-[10px] text-slate-600 uppercase tracking-[0.3em] font-black italic">Hafar Al Batin | Saudi Arabia | 2026</p>
        </footer>
    </main>

    <script>
        const stock = {
            hik: { t: 'HIKVISION PRO', c: 'hik-theme', items: [
                { n: 'DS-7604NI-K1', m: '4-CH 4K NVR', p: '345', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7604NI-K1.png' },
                { n: 'DS-7208HUHI-K1', m: '8-CH 5MP DVR', p: '545', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7208HUHI-K1.png' }
            ]},
            dah: { t: 'DAHUA WIZSENSE', c: 'dah-theme', items: [
                { n: 'NVR4104HS-I', m: '4-CH WizSense NVR', p: '320', i: 'https://www.dahuasecurity.com/asset/upload/product/20191024/NVR4104HS-I.png' },
                { n: 'XVR5108HS-I3', m: '8-CH AI XVR', p: '480', i: 'https://www.dahuasecurity.com/asset/upload/product/20210203/XVR5108HS-I3.png' }
            ]},
            ezviz: { t: 'EZVIZ WIFI', c: 'hik-theme', items: [
                { n: 'C6N 1080P', m: 'Smart Indoor PT', p: '145', i: 'https://m.media-amazon.com/images/I/51uI4W7e+BL._AC_SL1000_.jpg' },
                { n: 'C8C 360', m: 'Outdoor PTZ Camera', p: '320', i: 'https://m.media-amazon.com/images/I/51Hk8y683RL._AC_SL1000_.jpg' }
            ]},
            imou: { t: 'IMOU LIFE', c: 'dah-theme', items: [
                { n: 'Ranger 2', m: '4MP Indoor 360', p: '175', i: 'https://m.media-amazon.com/images/I/51r7H5eLpSL._AC_SL1000_.jpg' },
                { n: 'Cruiser 2', m: '4MP Outdoor PTZ', p: '340', i: 'https://m.media-amazon.com/images/I/51BfK8-j9TL._AC_SL1000_.jpg' }
            ]},
            hdd: { t: 'HDD STORAGE', c: 'storage-theme', items: [
                { n: 'WD Purple 4TB', m: 'Surveillance Grade', p: '425', i: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { n: 'Toshiba 1TB', m: 'Surveillance HDD', p: '165', i: 'https://m.media-amazon.com/images/I/718vHn+R76L._AC_SL1500_.jpg' },
                { n: 'WD Purple 10TB', m: 'Surveillance Grade', p: '1280', i: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' }
            ]},
            sandisk: { t: 'SANDISK MEMORY', c: 'sandisk-theme', items: [
                { n: 'Ultra 64GB', m: 'MicroSD XC', p: '40', i: 'https://m.media-amazon.com/images/I/617NnxA9dtL._AC_SL1500_.jpg' },
                { n: 'High Endurance 128GB', m: 'CCTV Spec', p: '110', i: 'https://m.media-amazon.com/images/I/61dYvI7vVpL._AC_SL1500_.jpg' }
            ]},
            tp: { t: 'TP-LINK NETWORK', c: 'tp-theme', items: [
                { n: 'Archer AX10', m: 'WiFi 6 Router', p: '290', i: 'https://m.media-amazon.com/images/I/51oGclD0XPL._AC_SL1500_.jpg' },
                { n: 'Deco M4', m: 'Mesh System', p: '380', i: 'https://m.media-amazon.com/images/I/51Z9q7y+fTL._AC_SL1500_.jpg' }
            ]},
            bill: { t: 'BILLZEST VIP', c: 'hik-theme', items: [
                { n: 'BillZest Pro', m: 'Video POS System', p: 'CALL', i: 'https://cdn-icons-png.flaticon.com/512/5662/5662359.png' }
            ]}
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('menu-hidden');
        }

        function render(key) {
            toggleMenu();
            const data = stock[key];
            document.getElementById('hero').style.display = 'none';
            const grid = document.getElementById('grid');
            grid.innerHTML = data.items.map(item => `
                <div class="product-card">
                    <img src="${item.i}" class="h-44 mx-auto mb-6 object-contain">
                    <h2 class="text-2xl font-black title-glow ${data.c}">${item.n}</h2>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-6">${item.m}</p>
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-3xl border border-slate-800">
                        <span class="text-2xl font-black text-blue-500 tracking-tighter"><span class="text-[10px] text-slate-500 mr-1 italic">SAR</span>${item.p}</span>
                        <span class="text-[10px] font-black uppercase text-blue-400 italic">Official Stock</span>
                    </div>
                </div>
            `).join('');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
