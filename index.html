<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Smart Catalog 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .submenu.active { max-height: 500px; }
        .product-view { display: none; position: fixed; inset: 0; background: #0f172a; z-index: 200; overflow-y: auto; padding: 20px; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-slate-800 flex flex-col gap-4 sticky top-0 bg-[#0f172a]/90 backdrop-blur-md z-50">
        <div class="flex justify-between items-center">
            <button onclick="toggleSidebar()" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700">
                <i class="fas fa-bars text-blue-400"></i>
            </button>
            <div class="text-xl font-black tracking-tighter uppercase">AirTech One</div>
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">ASIM</div>
        </div>
        
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search Camera, NVR, 4TB..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3 px-12 text-sm focus:border-blue-500 outline-none">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
        </div>
    </nav>

    <div class="p-6">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-800 rounded-[2rem] p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-black uppercase mb-2">Smart Inventory</h2>
            <p class="text-blue-100 text-xs mb-6 opacity-80 uppercase tracking-widest">Hafar Al Batin Premium Hub</p>
            <button onclick="toggleSidebar()" class="bg-white text-blue-900 px-8 py-3 rounded-xl font-black text-xs uppercase shadow-xl">Browse Brands</button>
        </div>
    </div>

    <div id="sidebar" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0f172a] border-r border-slate-800 z-[100] -translate-x-full flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="font-black text-blue-400 uppercase text-xs tracking-widest">AirTech Catalog</h2>
            <button onclick="toggleSidebar()" class="text-2xl text-slate-500">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/50 rounded-2xl border border-slate-800">
                <button onclick="toggleSub('hik-sub')" class="w-full flex justify-between p-4 text-[11px] font-black text-blue-400 uppercase">
                    Hikvision <i class="fas fa-chevron-down opacity-50"></i>
                </button>
                <div id="hik-sub" class="submenu px-4 pb-2">
                    <button onclick="loadCategory('Hikvision NVR')" class="w-full text-left py-3 text-slate-400 text-[11px] font-bold">NVR System</button>
                    <button onclick="loadCategory('Hikvision IP Camera')" class="w-full text-left py-3 text-slate-400 text-[11px] font-bold">IP Camera Outdoor</button>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-2xl border border-slate-800">
                <button onclick="toggleSub('hdd-sub')" class="w-full flex justify-between p-4 text-[11px] font-black text-purple-400 uppercase">
                    HDD Store <i class="fas fa-chevron-down opacity-50"></i>
                </button>
                <div id="hdd-sub" class="submenu px-4 pb-2">
                    <button onclick="loadCategory('WD Purple')" class="w-full text-left py-3 text-slate-400 text-[11px] font-bold">WD Purple</button>
                    <button onclick="loadCategory('Toshiba HDD')" class="w-full text-left py-3 text-slate-400 text-[11px] font-bold">Toshiba S300</button>
                </div>
            </div>
        </div>
        
        <div class="p-4 bg-slate-900 border-t border-slate-800">
            <a href="https://wa.me/966500000000" class="w-full bg-blue-600 py-4 rounded-xl flex items-center justify-center font-bold text-sm gap-2">
                <i class="fab fa-whatsapp"></i> CONTACT ASIM
            </a>
        </div>
    </div>

    <div id="productView" class="product-view">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h3 id="viewTitle" class="text-xl font-black text-blue-400 uppercase tracking-tighter">Products</h3>
            <button onclick="closeProductView()" class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-xl">&times;</button>
        </div>
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[90]"></div>

    <script>
        // Real Data (Point #1: Database)
        const products = [
            { id: 1, cat: 'Hikvision NVR', name: 'DS-7608NI-K2', price: '650 SAR', stock: 'INSTOCK', img: '📷' },
            { id: 2, cat: 'Hikvision IP Camera', name: 'DS-2CD2043G0-I', price: '380 SAR', stock: 'INSTOCK', img: '📷' },
            { id: 3, cat: 'WD Purple', name: 'WD Purple 4TB Surveillance', price: '420 SAR', stock: 'LOW STOCK', img: '💾' },
            { id: 4, cat: 'Toshiba HDD', name: 'S300 2TB Surveillance', price: '240 SAR', stock: 'INSTOCK', img: '💾' }
        ];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleSub(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function loadCategory(cat) {
            toggleSidebar();
            const grid = document.getElementById('productGrid');
            const filtered = products.filter(p => p.cat === cat);
            render(filtered, cat);
            document.getElementById('productView').style.display = 'block';
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query));
            if(query.length > 1) {
                render(filtered, "Search Results");
                document.getElementById('productView').style.display = 'block';
            }
        }

        function render(items, title) {
            document.getElementById('viewTitle').innerText = title;
            document.getElementById('productGrid').innerHTML = items.map(p => `
                <div class="product-card bg-slate-900 border border-slate-800 p-6 rounded-[2rem] transition-all">
                    <div class="h-32 bg-slate-800 rounded-3xl mb-4 flex items-center justify-center text-4xl">${p.img}</div>
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-black text-sm uppercase leading-tight">${p.name}</h4>
                        <span class="text-[8px] px-2 py-1 rounded bg-blue-500/10 text-blue-400 font-black">${p.stock}</span>
                    </div>
                    <p class="text-blue-500 font-black text-lg mb-4">${p.price}</p>
                    <button onclick="orderWhatsApp('${p.name}')" class="w-full bg-slate-800 hover:bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        Order via WhatsApp
                    </button>
                </div>
            `).join('');
        }

        function orderWhatsApp(name) {
            const msg = `Assalamu Alaikum Asim Bhai, I am interested in: ${name}. Is it available?`;
            window.open(`https://wa.me/966500000000?text=${encodeURIComponent(msg)}`);
        }

        function closeProductView() {
            document.getElementById('productView').style.display = 'none';
        }
    </script>
</body>
</html>
