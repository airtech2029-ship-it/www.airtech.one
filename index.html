<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Security Experts</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+Arabic:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0046BE; --dark: #001229; --green: #25D366; }
        body { margin: 0; font-family: sans-serif; background: #fff; color: #333; }
        
        /* Header */
        header { display: flex; justify-content: space-between; padding: 15px 5%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); align-items: center; }
        .logo { font-size: 22px; font-weight: 800; color: var(--blue); text-decoration: none; }

        /* Hero Video Section */
        .hero { position: relative; height: 75vh; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center; background: var(--dark); overflow: hidden; }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .content { z-index: 2; padding: 20px; }

        /* Buttons */
        .btn { padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: block; margin: 10px auto; width: 250px; text-align: center; font-size: 16px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #fff; }

        /* Footer & Payment Cards (The Fix) */
        footer { background: var(--dark); color: #fff; padding: 50px 5%; text-align: center; }
        .pay-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 30px; }
        .pay-card { background: #fff; border-radius: 10px; width: 100px; height: 45px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pay-card img { max-height: 22px; max-width: 90%; object-fit: contain; }
        .pay-card span { color: #000; font-weight: bold; font-size: 14px; } /* Backup Text */
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">AIRTECH ONE</a>
        <div style="color:var(--blue); font-weight:bold;">KSA</div>
    </header>

    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c27dbccd23ef08846b93937cad345d971550993d" type="video/mp4">
        </video>
        <div class="content">
            <h1 style="font-family: 'Noto Sans Arabic'; font-size: 32px; margin-bottom: 5px;">أمانك بلمسة ذكية</h1>
            <h2 style="font-family: 'Montserrat'; font-size: 22px; margin-top: 0;">Smart Security For Your World</h2>
            <p style="opacity: 0.8;">Hafar Al-Batin | Saudi Arabia</p>
            <div style="margin-top: 25px;">
                <a href="https://wa.me/966557978781" class="btn btn-blue">Request Survey</a>
                <a href="https://wa.me/966557978781" class="btn btn-green">Chat with Asim</a>
            </div>
        </div>
    </section>

    <footer>
        <h2 style="letter-spacing: 2px;">AIRTECH ONE</h2>
        <p style="opacity: 0.6;">CEO Mr. Asim | Hafar Al Batin</p>
        
        <div class="pay-grid">
            <div class="pay-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Mada_Logo.svg" alt="Mada" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none;">Mada</span>
            </div>
            <div class="pay-card">
                <img src="https://checkout.tabby.ai/assets/images/tabby-logo.svg" alt="Tabby" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none;">Tabby</span>
            </div>
            <div class="pay-card">
                <img src="https://cdn.tamara.co/assets/svg/tamara-logo-badge-en.svg" alt="Tamara" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none;">Tamara</span>
            </div>
            <div class="pay-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span style="display:none;">Visa</span>
            </div>
        </div>
        <p style="font-size: 11px; margin-top: 30px; opacity: 0.4;">© 2026 AirTech One. All rights reserved.</p>
    </footer>

</body>
</html>
