<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a1120; color: white; }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .submenu.active { max-height: 500px; }
        .side-panel { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-72 bg-[#0d1629] z-[100] border-r border-slate-800 -translate-x-full flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-lg font-black text-blue-500 uppercase italic tracking-tighter">AIRTECH MENU</h2>
            <button onclick="togglePanel()" class="text-2xl text-slate-400">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/50 rounded-xl border border-slate-800/50">
                <button onclick="toggleAccordion('hik-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-blue-500 uppercase tracking-widest">Hikvision Solutions</span>
                    <i class="fas fa-chevron-down text-[10px] text-blue-500"></i>
                </button>
                <div id="hik-menu" class="submenu border-l border-blue-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('hikNvr')" class="block p-3 text-xs font-bold text-slate-400">NVR System</a>
                    <a href="#" onclick="openProducts('hikDvr')" class="block p-3 text-xs font-bold text-slate-400">DVR System</a>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-xl border border-slate-800/50">
                <button onclick="toggleAccordion('dahua-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-orange-500 uppercase tracking-widest">Dahua Technology</span>
                    <i class="fas fa-chevron-down text-[10px] text-orange-500"></i>
                </button>
                <div id="dahua-menu" class="submenu border-l border-orange-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('dahuaNvr')" class="block p-3 text-xs font-bold text-slate-400">NVR System</a>
                    <a href="#" onclick="openProducts('dahuaDvr')" class="block p-3 text-xs font-bold text-slate-400">DVR System</a>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-xl border border-slate-800/50">
                <button onclick="toggleAccordion('hdd-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-purple-400 uppercase tracking-widest">HDD Store</span>
                    <i class="fas fa-chevron-down text-[10px] text-purple-500"></i>
                </button>
                <div id="hdd-menu" class="submenu border-l border-purple-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('hdd')" class="block p-3 text-xs font-bold text-slate-400">Surveillance HDD</a>
                </div>
            </div>

            <div class="p-4 space-y-4">
                <span class="text-[10px] font-black text-teal-400 uppercase tracking-widest">Networking</span>
                <a href="#" onclick="openProducts('net')" class="block ml-4 text-xs font-bold text-slate-200">TP-Link Solutions</a>
            </div>

            <div class="p-4 border-t border-slate-800">
                <a href="#" class="text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-blue-500 transition">BillZest VIP POS</a>
            </div>
        </div>

        <div class="p-6">
            <a href="https://wa.me/966500000000" class="w-full bg-blue-600 py-4 rounded-xl flex items-center justify-center gap-3 font-bold text-white uppercase text-xs">
                <i class="fab fa-whatsapp"></i> CONTACT ASIM
            </a>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center bg-[#0a1120] border-b border-slate-900 sticky top-0 z-50">
        <button onclick="togglePanel()" class="w-10 h-10 bg-slate-900/50 rounded-lg border border-slate-800 flex items-center justify-center"><i class="fas fa-bars text-blue-500"></i></button>
        <div class="text-xl font-black uppercase tracking-tighter italic">AIRTECH <span class="text-blue-600">ONE</span></div>
        <div class="w-10"></div>
    </nav>

    <header class="py-32 px-6 text-center">
        <h1 class="text-6xl font-black uppercase italic mb-2 tracking-tighter">AIRTECH<br><span class="text-blue-600">ONE</span></h1>
        <p class="text-slate-500 text-sm font-medium max-w-xs mx-auto mb-10 leading-relaxed">Saudi Arabia's Leading Distributor for CCTV & Networking Systems.</p>
        <button onclick="togglePanel()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-600/20">EXPLORE INVENTORY</button>
    </header>

    <footer class="mt-20 p-10 text-center border-t border-slate-900 bg-white/5">
        <h3 class="text-lg font-black uppercase tracking-tighter">AIRTECH ONE</h3>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[4px] mt-2">HAFAR AL BATIN | SAUDI ARABIA | 2026</p>
    </footer>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/80 hidden z-[90] backdrop-blur-sm"></div>

    <script>
        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }
        function toggleAccordion(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>
