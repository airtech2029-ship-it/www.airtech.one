    <style>
        /* ROOT VARIABLES 
        */
        :root {
            --primary-blue: #0046BE;
            --dark-blue: #002D7A;
            --white: #FFFFFF;
            --light-gray: #F4F7F9;
            --text-black: #1A1A1A;
            --hik-red: #D0021B; 
            --hik-grey: #6D6E71; 
            --whatsapp-green: #25D366;
            --shadow-light: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* CORE BODY STYLES 
        */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--white);
            color: var(--text-black);
            line-height: 1.8;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* HEADER NAVIGATION 
        */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
            padding: 25px 5%;
            border-bottom: 2px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 1000;
        }

        .sidebar-trigger {
            font-size: 30px;
            cursor: pointer;
            justify-self: start;
            transition: color 0.3s ease;
        }

        .sidebar-trigger:hover {
            color: var(--primary-blue);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary-blue);
            text-decoration: none;
            justify-self: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-icons {
            display: flex;
            gap: 25px;
            font-size: 24px;
            justify-self: end;
        }

        .header-icons i {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .header-icons i:hover {
            transform: scale(1.2);
            color: var(--primary-blue);
        }
