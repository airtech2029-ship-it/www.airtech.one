<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AirTech One | CCTV Store</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><style>

body{
margin:0;
font-family:'Open Sans',sans-serif;
background:#f5f6f7;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 20px;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:24px;
font-weight:bold;
color:#0046BE;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.header-icons{
display:flex;
gap:20px;
font-size:20px;
}

.cart-count{
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
position:absolute;
margin-left:-8px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:white;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
transition:0.3s;
}

.sidebar a{
display:block;
padding:12px 0;
text-decoration:none;
color:black;
font-weight:600;
border-bottom:1px solid #eee;
}

/* SEARCH */

.search-box{
text-align:center;
padding:30px;
background:white;
}

.search-box input{
width:60%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

/* PRODUCTS */

.products{
padding:50px 5%;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.price{
color:#0046BE;
font-weight:bold;
}

button{
background:#0046BE;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

</style></head><body><div id="sidebar" class="sidebar"><h3>Menu</h3><a href="#">CCTV Cameras</a>
<a href="#">DVR / NVR</a>
<a href="#">Network Switch</a>
<a href="#">Accessories</a>

</div><header><i class="fa fa-bars menu-btn" onclick="toggleMenu()"></i>

<div class="logo">AirTech One</div><div class="header-icons"><i class="fa fa-search"></i>

<div style="position:relative">
<i class="fa fa-shopping-cart"></i>
<span id="cartCount" class="cart-count">0</span>
</div><i class="fab fa-whatsapp"></i>

</div></header><!-- SEARCH --><div class="search-box"><input type="text" id="searchInput" placeholder="Search CCTV products..." onkeyup="searchProducts()"></div><!-- PRODUCTS --><section class="products"><div class="product-grid" id="productList"><div class="product">
<img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758?auto=format&fit=crop&w=800&q=80">
<h4>Hikvision Camera</h4>
<p class="price">299 SAR</p>
<button onclick="addToCart()">Add to Cart</button>
</div><div class="product">
<img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=800&q=80">
<h4>Dahua DVR</h4>
<p class="price">399 SAR</p>
<button onclick="addToCart()">Add to Cart</button>
</div><div class="product">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80">
<h4>Network Switch</h4>
<p class="price">199 SAR</p>
<button onclick="addToCart()">Add to Cart</button>
</div></div></section><script>

function toggleMenu(){

let sidebar=document.getElementById("sidebar");

if(sidebar.style.left==="0px"){
sidebar.style.left="-260px";
}else{
sidebar.style.left="0px";
}

}

let cart=0;

function addToCart(){

cart++;

document.getElementById("cartCount").innerText=cart;

}

function searchProducts(){

let input=document.getElementById("searchInput").value.toLowerCase();

let products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){

let name=products[i].innerText.toLowerCase();

if(name.includes(input)){

products[i].style.display="block";

}else{

products[i].style.display="none";

}

}

}

</script></body>
</html>
