<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | VIP Security Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #080808;
            --gold: #d4af37;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Gold Branding Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0,0,0,0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 1.3rem; font-weight: 800; color: var(--gold); letter-spacing: 1.5px; }
        .logo span { color: #ffffff; }

        .lang-btn {
            background: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            border: none;
        }

        /* Professional Slider */
        .slider-container {
            width: 100%;
            height: 250px; 
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .slides {
            display: flex;
            width: 300%; 
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Dark overlay for text clarity */
        .slide::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .slide-1 { background-image: url('https://images.unsplash.com/photo-1557597774-9d2739f85a94?auto=format&fit=crop&w=1000'); }
        .slide-2 { background-image: url('https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&w=1000'); }
        .slide-3 { background-image: url('https://images.unsplash.com/photo-1516383274235-5f42d6c6426d?auto=format&fit=crop&w=1000'); }

        .slide h2, .slide p { position: relative; z-index: 2; }
        .slide h2 { color: var(--gold); font-size: 1.6rem; margin: 0; font-weight: 800; }
        .slide p { font-size: 1rem; color: #fff; margin-top: 5px; }

        /* Brand Grid */
        .brand-section { padding: 0 15px; max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .brand-card {
            background: var(--card-bg);
            border: 1.2px solid var(--gold);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Fix for Brand Logos */
        .brand-card img {
            width: 80px; 
            height: 40px;
            object-fit: contain;
            margin-bottom: 12px;
            background: transparent;
        }

        .brand-card h3 { 
            color: #ffffff; 
            font-size: 0.95rem; 
            margin: 0; 
            font-weight: 700;
            text-transform: uppercase;
        }

        footer {
            margin-top: 60px; 
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
        }

        .contact-link { color: #bbb; text-decoration: none; font-size: 0.9rem; display: block; margin: 12px 0; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .slider-container { height: 400px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">AIRTECH <span>ONE</span></div>
    <button class="lang-btn" onclick="toggleLang()">العربية</button>
</nav>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide slide-1">
            <h2>HIKVISION 4K</h2>
            <p>Smart Security Solutions</p>
        </div>
        <div class="slide slide-2">
            <h2>GIGABIT NETWORKS</h2>
            <p>High Speed Connectivity</p>
        </div>
        <div class="slide slide-3">
            <h2>VIP STORAGE</h2>
            <p>Western Digital & Seagate</p>
        </div>
    </div>
</div>

<div class="brand-section">
    <div class="grid">
        <a href="hikvision/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Hikvision_logo.svg/1280px-Hikvision_logo.svg.png" alt="Hikvision">
            <h3>HIKVISION</h3>
        </a>
        <a href="ezviz/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/EZVIZ_logo.svg/2560px-EZVIZ_logo.svg.png" alt="Ezviz">
            <h3>EZVIZ</h3>
        </a>
        <a href="dahua/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Dahua_Technology_logo.svg/1200px-Dahua_Technology_logo.svg.png" alt="Dahua">
            <h3>DAHUA</h3>
        </a>
        <a href="imou/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Imou_logo.png/640px-Imou_logo.png" alt="Imou">
            <h3>IMOU</h3>
        </a>
        <a href="tapo/" class="brand-card">
            <img src="https://www.tp-link.com/us/press/news/18790/tapo-logo.png" alt="Tapo">
            <h3>TAPO</h3>
        </a>
        <a href="tplink/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/TP-Link_logo.svg/1200px-TP-Link_logo.svg.png" alt="TP-Link">
            <h3>TP-LINK</h3>
        </a>
        <a href="hddstore/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Western_Digital_logo.svg/1200px-Western_Digital_logo.svg.png" alt="HDD">
            <h3>HDD STORE</h3>
        </a>
        <a href="cisco/" class="brand-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Cisco_logo_blue_2016.svg/1200px-Cisco_logo_blue_2016.svg.png" alt="Cisco">
            <h3>CISCO</h3>
        </a>
    </div>
</div>

<footer>
    <a href="mailto:admin@airtech.one" class="contact-link">📧 admin@airtech.one</a>
    <a href="https://wa.me/966550898978" class="contact-link">💬 WhatsApp Support</a>
</footer>

<script>
    let currentSlide = 0;
    const slider = document.getElementById('slider');
    function moveSlide() {
        currentSlide = (currentSlide + 1) % 3;
        slider.style.transform = `translateX(-${currentSlide * 33.33}%)`;
    }
    setInterval(moveSlide, 4000);

    function toggleLang() {
        const isAr = document.documentElement.dir === "ltr";
        document.documentElement.dir = isAr ? "rtl" : "ltr";
        document.querySelector('.lang-btn').innerText = isAr ? "English" : "العربية";
    }
</script>
</body>
</html>
