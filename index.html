<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | VIP Security Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(18, 18, 18, 0.9);
            --gold: #d4af37;
            --text: #ffffff;
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: var(--text);
            overflow-x: hidden;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 6%; background: rgba(0,0,0,0.9);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
        .lang-btn {
            background: var(--gold); color: #000; padding: 8px 18px;
            border-radius: 50px; font-weight: 800; border: none; cursor: pointer;
        }

        /* Slider - Optimized */
        .slider-container { width: 100%; height: 350px; position: relative; overflow: hidden; background: #111; }
        .slides { display: flex; width: 300%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { 
            width: 100%; height: 100%; position: relative; 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .slide::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }

        /* LIVE ONLINE IMAGE LINKS */
        .slide-1 { background-image: url('https://i.ibb.co/6R2M3yH0/networking.jpg'); }
        .slide-2 { background-image: url('https://i.ibb.co/67vK9fS8/cctv.jpg'); }
        .slide-3 { background-image: url('https://i.ibb.co/LzXvL87V/server.webp'); }

        .slide-content { position: relative; z-index: 2; text-align: center; color: #fff; }
        .slide h2 { color: var(--gold); font-size: 2rem; margin-bottom: 5px; }

        /* Grid */
        .brand-section { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .brand-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 20px; text-align: center; text-decoration: none;
        }
        .brand-card img { width: 80px; height: 40px; object-fit: contain; margin-bottom: 10px; }
        .brand-card h3 { color: #fff; font-size: 0.9rem; margin: 0; }

        /* WhatsApp */
        .wa-float {
            position: fixed; bottom: 20px; right: 20px;
            background: #25d366; width: 55px; height: 55px;
            border-radius: 50px; display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .slider-container { height: 500px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">AIRTECH ONE</div>
    <button class="lang-btn" onclick="toggleLang()">العربية</button>
</nav>

<div class="slider-container">
    <div class="slides" id="slider">
        <div class="slide slide-1">
            <div class="slide-content">
                <h2 data-en="INTEGRATED NETWORKS" data-ar="شبكات متكاملة">INTEGRATED NETWORKS</h2>
                <p>Enterprise Solutions</p>
            </div>
        </div>
        <div class="slide slide-2">
            <div class="slide-content">
                <h2 data-en="VIP SURVEILLANCE" data-ar="مراقبة VIP">VIP SURVEILLANCE</h2>
                <p>4K Security Systems</p>
            </div>
        </div>
        <div class="slide slide-3">
            <div class="slide-content">
                <h2 data-en="SECURE DATA" data-ar="بيانات آمنة">SECURE DATA</h2>
                <p>Professional Storage</p>
            </div>
        </div>
    </div>
</div>

<div class="brand-section">
    <div class="grid">
        <div class="brand-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Hikvision_logo.svg/1280px-Hikvision_logo.svg.png"><h3>HIKVISION</h3></div>
        <div class="brand-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/EZVIZ_logo.svg/2560px-EZVIZ_logo.svg.png"><h3>EZVIZ</h3></div>
        <div class="brand-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Dahua_Technology_logo.svg/1200px-Dahua_Technology_logo.svg.png"><h3>DAHUA</h3></div>
        <div class="brand-card"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Imou_logo.png/640px-Imou_logo.png"><h3>IMOU</h3></div>
    </div>
</div>

<a href="https://wa.me/966550898978" class="wa-float">
    <svg width="30" height="30" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
</a>

<script>
    let currentSlide = 0;
    const slider = document.getElementById('slider');
    setInterval(() => {
        currentSlide = (currentSlide + 1) % 3;
        slider.style.transform = `translateX(-${currentSlide * 33.333}%)`;
    }, 4000);

    function toggleLang() {
        const isAr = document.documentElement.dir === "ltr";
        document.documentElement.dir = isAr ? "rtl" : "ltr";
        document.querySelectorAll('[data-en]').forEach(el => {
            el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
        });
    }
</script>
</body>
</html>
