<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirTech One | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
        .airtech-blue { color: #3b82f6; }
        
        /* Premium Splash Screen */
        .hero-section { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111827 0%, #000 100%); }
        .big-logo { font-size: 3.8rem; font-style: italic; font-weight: 900; line-height: 0.85; letter-spacing: -3px; text-align: center; text-transform: uppercase; }
        .sub-heading { font-size: 10px; color: #4b5563; letter-spacing: 4px; margin-top: 25px; font-weight: 800; text-transform: uppercase; }

        /* Menu Rows */
        .section-tag { color: #3b82f6; font-size: 11px; font-weight: 900; letter-spacing: 2px; margin: 35px 0 12px 5px; text-transform: uppercase; border-left: 3px solid #3b82f6; padding-left: 12px; }
        .item-row { background: #0d1117; border: 1px solid #1a1a1a; border-radius: 18px; padding: 22px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .item-row:active { transform: scale(0.96); background: #111827; }

        /* Product Display */
        .modal-view { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        .prod-card { background: #0d1117; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; position: relative; }
        .discount-badge { position: absolute; top: 12px; right: 12px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; }
        .img-box { background: white; border-radius: 12px; height: 160px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; }
        .img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .strike { text-decoration: line-through; color: #4b5563; font-size: 11px; margin-right: 6px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 class="big-logo">AIRTECH<br><span class="airtech-blue">ONE</span></h1>
        <p class="sub-heading">Hafar Al Batin Specialist</p>
    </div>

    <div class="p-6 bg-black">
        <div class="section-tag">Wireless Security</div>
        <div onclick="openCatalog('ezviz')" class="item-row"><span>Ezviz WiFi Series</span> <i class="fas fa-wifi airtech-blue"></i></div>
        <div onclick="openCatalog('imou')" class="item-row"><span>Imou Smart Series</span> <i class="fas fa-video airtech-blue"></i></div>

        <div class="section-tag">CCTV Professional</div>
        <div onclick="openCatalog('hik')" class="item-row"><span>Hikvision Stock</span> <i class="fas fa-chevron-right airtech-blue"></i></div>
        <div onclick="openCatalog('dahua')" class="item-row"><span>Dahua Technology</span> <i class="fas fa-chevron-right airtech-blue"></i></div>

        <div class="section-tag">Storage</div>
        <div onclick="openCatalog('storage')" class="item-row"><span>WD Purple HDD</span> <i class="fas fa-hdd airtech-blue"></i></div>
    </div>

    <div id="productModal" class="modal-view">
        <div class="p-6 border-b border-zinc-900 flex justify-between items-center bg-black sticky top-0 z-10">
            <button onclick="closeCatalog()" class="text-blue-500 font-black text-sm uppercase flex items-center"><i class="fas fa-arrow-left mr-2"></i> Back</button>
            <span id="modalTitle" class="airtech-blue font-black uppercase text-xs">CATALOG</span>
            <div class="w-10"></div>
        </div>
        <div id="productGrid" class="p-6 overflow-y-auto pb-40"></div>
    </div>

    <script>
        const phone = "966550898978"; // Aapka number verified
        const airtechData = {
            ezviz: { t: "EZVIZ WIFI", items: [
                { m: 'C6N 4MP', n: 'Ezviz Smart Pan/Tilt 4MP', p: 175, i: 'https://m.media-amazon.com/images/I/51p08l21tCL._AC_SL1000_.jpg' },
                { m: 'C3N Outdoor', n: 'Ezviz Color Night Vision', p: 210, i: 'https://m.media-amazon.com/images/I/61N+U9p8H2L._AC_SL1500_.jpg' }
            ]},
            imou: { t: "IMOU WIFI", items: [
                { m: 'Ranger 2', n: 'Imou Indoor 360 4MP', p: 160, i: 'https://m.media-amazon.com/images/I/51YVvG9-mYL._AC_SL1500_.jpg' },
                { m: 'Cruiser 4MP', n: 'Imou Outdoor PTZ Color', p: 295, i: 'https://m.media-amazon.com/images/I/618x430-DPL._AC_SL1500_.jpg' }
            ]},
            hik: { t: "HIKVISION", items: [
                { m: '7608NI-K2', n: '8-CH 4K Pro NVR', p: 595, i: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' },
                { m: '7732NI-K4', n: '32-CH Enterprise NVR', p: 1550, i: 'https://m.media-amazon.com/images/I/41-N6B6-y3L._AC_SL1000_.jpg' }
            ]},
            storage: { t: "STORAGE", items: [
                { m: '2TB PURZ', n: 'WD Purple Surveillance HDD', p: 285, i: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' },
                { m: '4TB PURZ', n: 'WD Purple Surveillance HDD', p: 435, i: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' }
            ]}
        };

        function openCatalog(key) {
            const data = airtechData[key] || { t: "STOCK", items: [] };
            document.getElementById('modalTitle').innerText = data.t;
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.items.map(p => {
                const discounted = Math.round(p.p * 0.98); // Perfect 2% Discount
                return `
                <div class="prod-card shadow-2xl">
                    <div class="discount-badge">2% OFF</div>
                    <p class="text-[9px] text-zinc-600 font-bold mb-2 uppercase">${p.m}</p>
                    <div class="img-box mb-4"><img src="${p.i}" loading="lazy"></div>
                    <h3 class="text-xs font-black uppercase mb-4 h-8 overflow-hidden">${p.n}</h3>
                    <div class="flex justify-between items-center border-t border-zinc-900 pt-4">
                        <div><span class="strike">${p.p}</span><span class="text-xl font-black airtech-blue">${discounted} <small class="text-[9px]">SAR</small></span></div>
                        <a href="https://wa.me/${phone}?text=Assalamu Alaikum AirTech One, I am interested in ${p.n} (${p.m})" class="text-green-500 text-3xl active:scale-90 transition-transform"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('productModal').style.display = 'flex';
        }
        function closeCatalog() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
