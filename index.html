<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Smart Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .side-panel { transition: transform 0.3s ease; }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .submenu.active { max-height: 500px; }
        #productView { display: none; position: fixed; inset: 0; background: #0f172a; z-index: 200; overflow-y: auto; }
    </style>
</head>
<body>

    <nav class="p-5 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-[#0f172a] z-50">
        <button onclick="openSidebar()" class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center">
            <i class="fas fa-bars text-blue-400"></i>
        </button>
        <div class="text-xl font-black tracking-tighter uppercase">AirTech One</div>
        <div class="w-10"></div>
    </nav>

    <main class="p-10 text-center min-h-[80vh] flex flex-col items-center justify-center">
        <h1 class="text-5xl font-black mb-4 uppercase tracking-tighter">Security<br><span class="text-blue-500">Reimagined</span></h1>
        <p class="text-slate-400 mb-8 max-w-xs mx-auto text-sm">Premium destination for Hikvision & Dahua in Hafar Al Batin.</p>
        <button onclick="openSidebar()" class="bg-blue-600 px-8 py-4 rounded-2xl font-black shadow-xl">OPEN SMART CATALOG</button>
    </main>

    <div id="sidebar" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0f172a] border-r border-slate-800 z-[100] -translate-x-full flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="font-black text-blue-400 uppercase tracking-widest text-sm">AirTech Catalog</h2>
            <button onclick="closeSidebar()" class="text-2xl">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/50 rounded-xl border border-slate-800">
                <button onclick="toggleMenu('hik-sub')" class="w-full flex justify-between p-4 text-xs font-bold text-blue-400 uppercase">
                    Hikvision Solutions <i class="fas fa-chevron-down"></i>
                </button>
                <div id="hik-sub" class="submenu px-4 pb-2 space-y-1">
                    <button onclick="showItems('Hikvision NVR')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">NVR System</button>
                    <button onclick="showItems('Hikvision DVR')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">DVR System</button>
                    <button onclick="showItems('Hikvision IP Camera')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">IP Camera Outdoor</button>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-xl border border-slate-800">
                <button onclick="toggleMenu('dah-sub')" class="w-full flex justify-between p-4 text-xs font-bold text-orange-400 uppercase">
                    Dahua Technology <i class="fas fa-chevron-down"></i>
                </button>
                <div id="dah-sub" class="submenu px-4 pb-2 space-y-1">
                    <button onclick="showItems('Dahua NVR')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">Dahua NVR</button>
                    <button onclick="showItems('Dahua DVR')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">Dahua DVR</button>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-xl border border-slate-800">
                <button onclick="toggleMenu('hdd-sub')" class="w-full flex justify-between p-4 text-xs font-bold text-purple-400 uppercase">
                    HDD Store <i class="fas fa-chevron-down"></i>
                </button>
                <div id="hdd-sub" class="submenu px-4 pb-2 space-y-1">
                    <button onclick="showItems('WD Purple')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">WD Purple</button>
                    <button onclick="showItems('Toshiba S300')" class="w-full text-left py-3 text-slate-400 text-xs font-bold">Toshiba HDD</button>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-800">
            <a href="https://wa.me/966500000000" class="w-full bg-blue-600 py-4 rounded-xl flex items-center justify-center font-bold gap-2">
                <i class="fab fa-whatsapp"></i> CONTACT ASIM
            </a>
        </div>
    </div>

    <div id="productView" class="p-6">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h3 id="viewTitle" class="text-2xl font-black text-blue-400 uppercase">Category</h3>
            <button onclick="closeProductView()" class="w-10 h-10 bg-slate-800 rounded-lg text-xl">&times;</button>
        </div>
        <div id="productGrid" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <div id="overlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/70 hidden z-[90]"></div>

    <script>
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('overlay').classList.remove('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        }
        function toggleMenu(id) {
            document.getElementById(id).classList.toggle('active');
        }
        
        function showItems(cat) {
            closeSidebar();
            const view = document.getElementById('productView');
            document.getElementById('viewTitle').innerText = cat;
            
            const products = [
                { name: cat + " Pro-1", price: "550 SAR", desc: "Premium quality surveillance." },
                { name: cat + " Max-2", price: "820 SAR", desc: "High performance system." }
            ];

            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                    <div class="h-32 bg-slate-800 rounded-xl mb-4 flex items-center justify-center">
                        <i class="fas fa-camera text-3xl text-slate-700"></i>
                    </div>
                    <h4 class="font-bold text-lg">${p.name}</h4>
                    <p class="text-slate-500 text-xs mb-4">${p.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-blue-400 font-black">${p.price}</span>
                        <button class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold">BUY NOW</button>
                    </div>
                </div>
            `).join('');

            view.style.display = 'block';
        }

        function closeProductView() {
            document.getElementById('productView').style.display = 'none';
        }
    </script>
</body>
</html>
