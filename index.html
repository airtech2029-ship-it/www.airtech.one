<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRTECH ONE | HAFAR AL BATIN VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&family=Noto+Sans+Arabic:wght@400;900&display=swap');
        
        body { background-color: #05070a; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .arabic { font-family: 'Noto Sans Arabic', sans-serif; }
        
        /* Sidebar Glass Effect */
        #sidebar { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(10, 15, 29, 0.98);
            backdrop-filter: blur(20px);
        }
        .menu-hidden { transform: translateX(-100%); }
        
        /* Card Jalwa */
        .product-card { 
            background: linear-gradient(180deg, #0f172a 0%, #05070a 100%);
            border-radius: 2.5rem; 
            border: 1px solid #1e293b; 
            padding: 30px; 
            transition: all 0.4s ease;
        }
        .product-card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .price-tag {
            background: rgba(0,0,0,0.5);
            border-radius: 1.5rem;
            border-left: 4px solid #3b82f6;
        }

        .title-font { font-family: 'Orbitron', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#0a0f1d]/90 backdrop-blur-md border-b border-slate-900 sticky top-0 z-50">
        <button onclick="toggleMenu()" class="p-4 bg-blue-600/10 rounded-2xl border border-blue-500/20 active:scale-95 transition">
            <i class="fas fa-th-large text-blue-500"></i>
        </button>
        <div class="text-center italic font-black text-2xl tracking-tighter uppercase">
            AIRTECH <span class="text-blue-600">ONE</span>
            <p class="text-[7px] tracking-[0.5em] text-slate-500 block uppercase font-bold">VIP Distribution</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" id="langBtn" class="text-[10px] bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 text-slate-300 font-black uppercase">العربية</button>
        </div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-80 p-6 menu-hidden shadow-2xl overflow-y-auto border-r border-white/5">
        <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-5">
            <div>
                <h2 class="text-blue-500 font-black italic text-xl uppercase tracking-tighter">AIRTECH</h2>
                <p class="text-[9px] text-slate-500 uppercase font-bold">Main Inventory</p>
            </div>
            <button onclick="toggleMenu()" class="text-slate-500 text-3xl active:text-white">&times;</button>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-slate-800">
                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-4">Security & Surveillance</p>
                <button onclick="render('hik_nvr')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 hover:text-white transition">HIKVISION NVR</button>
                <button onclick="render('hik_dvr')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 hover:text-white transition">HIKVISION DVR</button>
                <button onclick="render('ezviz')" class="block w-full text-left py-2 text-sm font-black text-blue-400 italic">EZVIZ WIFI SERIES</button>
            </div>

            <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-slate-800">
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-4">AI Vision Technology</p>
                <button onclick="render('dah_nvr')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 hover:text-white">DAHUA WIZSENSE NVR</button>
                <button onclick="render('dah_xvr')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 hover:text-white">DAHUA XVR SYSTEM</button>
                <button onclick="render('imou')" class="block w-full text-left py-2 text-sm font-black text-orange-400 italic uppercase">IMOU LIFE WIRELESS</button>
            </div>

            <div class="bg-slate-900/40 p-5 rounded-[2rem] border border-slate-800">
                <p class="text-[9px] font-black text-purple-500 uppercase tracking-widest mb-4">Infrastructure</p>
                <button onclick="render('hdd')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 uppercase">Surveillance HDD</button>
                <button onclick="render('sandisk')" class="block w-full text-left py-2 text-sm font-bold text-slate-300 uppercase">SanDisk Memory</button>
                <button onclick="render('network')" class="block w-full text-left py-2 text-sm font-black text-purple-400 italic">TP-LINK / TAPO</button>
            </div>

            <button onclick="render('bill')" class="w-full p-5 bg-gradient-to-br from-blue-600/20 to-transparent rounded-3xl border border-blue-500/30 flex items-center justify-center gap-3 mt-10 hover:border-blue-500 transition">
                <i class="fas fa-crown text-blue-500 shadow-blue-500/50"></i>
                <span class="text-[11px] font-black text-blue-400 uppercase tracking-widest">BillZest VIP POS</span>
            </button>
        </div>
    </div>

    <main class="p-6 min-h-screen">
        <div id="hero" class="py-32 text-center">
            <h1 class="text-[12vw] font-black italic tracking-tighter leading-none opacity-5 select-none absolute left-0 right-0 top-20">AIRTECH</h1>
            <h2 class="text-4xl font-black italic tracking-tighter uppercase relative z-10">Select <span class="text-blue-600">Inventory</span></h2>
            <p class="text-slate-500 text-[10px] tracking-[0.5em] uppercase font-black mt-4">Hafar Al Batin • Kingdom of Saudi Arabia</p>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="py-20 text-center bg-[#05070a] border-t border-slate-900">
        <p class="text-[10px] text-slate-600 uppercase tracking-[0.4em] font-black">AirTech One Business Solutions 2026</p>
    </footer>

    <script>
        const stock = {
            hik_nvr: { t: 'HIKVISION NVR', c: 'text-blue-500', items: [
                { n: 'DS-7604NI-K1', m: '4-CH 4K Resolution', p: '345', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7604NI-K1.png' },
                { n: 'DS-7608NI-K2', m: '8-CH 2-SATA 4K', p: '590', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7608NI-K2.png' },
                { n: 'DS-7716NI-K4', m: '16-CH 4-SATA 4K', p: '1150', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7700/7716NI-K4.png' }
            ]},
            hik_dvr: { t: 'HIKVISION DVR', c: 'text-blue-400', items: [
                { n: 'DS-7204HGHI-K1', m: '4-CH 1080P Lite', p: '195', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7204HGHI-K1.png' },
                { n: 'DS-7208HUHI-K1', m: '8-CH 5MP Turbo', p: '545', i: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7208HUHI-K1.png' }
            ]},
            ezviz: { t: 'EZVIZ WIFI', c: 'text-emerald-500', items: [
                { n: 'C6N 2MP', m: 'Indoor Smart PT', p: '145', i: 'https://m.media-amazon.com/images/I/51uI4W7e+BL._AC_SL1000_.jpg' },
                { n: 'C8W Pro', m: '3K Outdoor PTZ', p: '465', i: 'https://m.media-amazon.com/images/I/61Kx7jWlPFL._AC_SL1500_.jpg' }
            ]},
            dah_nvr: { t: 'DAHUA NVR', c: 'text-orange-500', items: [
                { n: 'NVR4104HS-I', m: '4-CH WizSense AI', p: '320', i: 'https://www.dahuasecurity.com/asset/upload/product/20191024/NVR4104HS-I.png' },
                { n: 'NVR4216-4KS2', m: '16-CH 4K Pro', p: '720', i: 'https://www.dahuasecurity.com/asset/upload/product/20180521/NVR4216-4KS2.png' }
            ]},
            imou: { t: 'IMOU LIFE', c: 'text-orange-400', items: [
                { n: 'Ranger 2', m: '4MP Indoor 360', p: '175', i: 'https://m.media-amazon.com/images/I/51r7H5eLpSL._AC_SL1000_.jpg' },
                { n: 'Cruiser 2', m: '4MP Outdoor Full-Color', p: '340', i: 'https://m.media-amazon.com/images/I/51BfK8-j9TL._AC_SL1000_.jpg' }
            ]},
            hdd: { t: 'SURVEILLANCE HDD', c: 'text-purple-500', items: [
                { n: 'WD Purple 1TB', m: 'Western Digital', p: '185', i: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { n: 'WD Purple 4TB', m: 'Western Digital', p: '425', i: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { n: 'WD Purple 10TB', m: 'Western Digital', p: '1280', i: 'https://m.media-amazon.com/images/I/81S88mBvSML._AC_SL1500_.jpg' },
                { n: 'Toshiba 2TB', m: 'Surveillance S300', p: '240', i: 'https://m.media-amazon.com/images/I/718vHn+R76L._AC_SL1500_.jpg' }
            ]},
            sandisk: { t: 'SANDISK MEMORY', c: 'text-red-500', items: [
                { n: 'Ultra 64GB', m: 'MicroSD XC Card', p: '40', i: 'https://m.media-amazon.com/images/I/617NnxA9dtL._AC_SL1500_.jpg' },
                { n: 'High Endurance 128GB', m: 'CCTV Spec', p: '110', i: 'https://m.media-amazon.com/images/I/61dYvI7vVpL._AC_SL1500_.jpg' }
            ]},
            network: { t: 'NETWORK SOLUTIONS', c: 'text-pink-500', items: [
                { n: 'Archer AX10', m: 'TP-Link WiFi 6', p: '290', i: 'https://m.media-amazon.com/images/I/51oGclD0XPL._AC_SL1500_.jpg' },
                { n: 'Tapo C200', m: 'Home Security PT', p: '135', i: 'https://m.media-amazon.com/images/I/51Z9q7y+fTL._AC_SL1500_.jpg' }
            ]},
            bill: { t: 'BILLZEST VIP', c: 'text-blue-500', items: [
                { n: 'BillZest Pro', m: 'Video POS Integrated', p: 'CALL', i: 'https://cdn-icons-png.flaticon.com/512/5662/5662359.png' }
            ]}
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('menu-hidden');
        }

        function toggleLang() {
            const html = document.getElementById('main-html');
            const btn = document.getElementById('langBtn');
            if(html.dir === 'ltr') {
                html.dir = 'rtl';
                html.classList.add('arabic');
                btn.innerText = 'English';
            } else {
                html.dir = 'ltr';
                html.classList.remove('arabic');
                btn.innerText = 'العربية';
            }
        }

        function render(key) {
            toggleMenu();
            const data = stock[key];
            document.getElementById('hero').style.display = 'none';
            const grid = document.getElementById('grid');
            grid.innerHTML = data.items.map(item => `
                <div class="product-card group">
                    <img src="${item.i}" class="h-48 mx-auto mb-8 object-contain group-hover:scale-110 transition duration-500">
                    <h2 class="text-3xl font-black title-font uppercase italic tracking-tighter ${data.c}">${item.n}</h2>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-8">${item.m}</p>
                    <div class="price-tag p-5 flex justify-between items-center bg-black/40 backdrop-blur-sm">
                        <div class="text-left">
                            <span class="block text-[8px] text-slate-500 font-black uppercase italic tracking-widest">Official Rate</span>
                            <span class="text-3xl font-black tracking-tighter text-white"><span class="text-[10px] text-blue-500 mr-1 italic">SAR</span>${item.p}</span>
                        </div>
                        <i class="fas fa-check-circle text-blue-600 text-xl"></i>
                    </div>
                </div>
            `).join('');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
