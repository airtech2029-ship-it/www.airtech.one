<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>AirTech One | CCTV & IT Solutions Hafar Al Batin</title>
    <meta name="description" content="Official AirTech One portal for CCTV, WiFi, and IT services in Hafar Al Batin.">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0062ff; --dark: #050505; --card: #0f172a; --text: #f8fafc; --gold: #ffd700; }
        body { background: var(--dark); color: var(--text); font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }
        .arabic { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }
        
        /* Glassmorphism Design */
        .glass-card { background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; backdrop-filter: blur(12px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; font-family: 'Orbitron'; }
        .btn-main:hover { box-shadow: 0 0 25px var(--primary); transform: translateY(-3px); }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none; }
        
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 1.6rem; color: var(--primary); font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AIRTECH<span>ONE</span></div>
        <div class="arabic" style="color:var(--gold); font-size: 0.9rem;">حفر الباطن | SAUDI PRO</div>
    </header>

    <section style="padding: 60px 5%; text-align: center;">
        <h1 style="font-size: 2.8rem; margin-bottom: 5px;">AIRTECH <span style="color:var(--primary)">ONE</span></h1>
        <p class="arabic" style="color: #94a3b8; font-size: 1.1rem; margin-bottom: 40px;">نظام إدارة الضمان والخدمات الذكية</p>

        <div class="glass-card" style="max-width: 450px; margin: 0 auto;">
            <div id="login-form">
                <h4 style="margin-bottom: 25px; letter-spacing: 2px;">WARRANTY CHECK</h4>
                <input type="text" id="cPhone" placeholder="Mobile Number (05xxxxxxx)">
                <button class="btn-main" onclick="verifyClient()">VERIFY STATUS</button>
            </div>
            <div id="dash-info" class="hidden">
                </div>
        </div>
    </section>

    <footer style="padding: 40px; text-align: center; border-top: 1px solid #1e293b; margin-top: 50px;">
        <p style="opacity: 0.3; font-size: 0.7rem;">&copy; 2026 AirTech One Saudi Arabia.</p>
        <i class="fas fa-shield-alt" onclick="openAdminModal()" style="opacity: 0.1; cursor: pointer; margin-top: 20px;"></i>
    </footer>

    <div id="adminModal" class="modal hidden">
        <div class="glass-card" style="width: 350px;">
            <h3 style="text-align: center; margin-bottom: 20px;">ADMIN ACCESS</h3>
            <input type="password" id="adminKey" placeholder="Master Password">
            <button class="btn-main" onclick="accessAdmin()">UNLOCK PANEL</button>
            <button onclick="closeModal('adminModal')" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; width:100%;">Cancel</button>
        </div>
    </div>

    <div id="managerDash" class="modal hidden">
        <div class="glass-card" style="width: 450px;">
            <h3 style="color: var(--primary); margin-bottom: 20px;">CUSTOMER MANAGER</h3>
            <input type="text" id="nName" placeholder="Customer Name">
            <input type="text" id="nPhone" placeholder="Mobile Number">
            <input type="date" id="nExpiry">
            <select id="nStatus">
                <option value="Active ✅">Active</option>
                <option value="Service Due ⚠️">Service Due</option>
                <option value="Expired ❌">Expired</option>
            </select>
            <button class="btn-main" onclick="saveData()" style="background: #25d366;">SAVE TO CLOUD</button>
            <button onclick="closeModal('managerDash')" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; width:100%;">Close</button>
        </div>
    </div>

    <script>
        // Verified Firebase Config from Screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCjx_7pP_yuB0IowOpGNrdDO5F_3S_0I",
            authDomain: "airtech-one-23985.firebaseapp.com",
            projectId: "airtech-one-23985",
            storageBucket: "airtech-one-23985.firebasestorage.app",
            messagingSenderId: "132253722874",
            appId: "1:132253722874:web:34fe348d24fec8757d4143",
            measurementId: "G-QW7BV7NFRD"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Admin & UI Functions
        function openAdminModal() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function accessAdmin() {
            if(document.getElementById('adminKey').value === "Asim@2026") {
                closeModal('adminModal');
                document.getElementById('managerDash').classList.remove('hidden');
            } else { alert("Incorrect Key!"); }
        }

        // Save to Firebase
        function saveData() {
            const name = document.getElementById('nName').value;
            const phone = document.getElementById('nPhone').value;
            const expiry = document.getElementById('nExpiry').value;
            const status = document.getElementById('nStatus').value;

            if(!name || !phone) return alert("Please fill Name and Phone!");

            db.collection("customers").doc(phone).set({
                name, phone, expiry, status, timestamp: new Date()
            }).then(() => {
                alert("Customer Data Saved Securely!");
                closeModal('managerDash');
            }).catch(err => alert("Error: " + err.message));
        }

        // Client Search
        function verifyClient() {
            const phone = document.getElementById('cPhone').value;
            if(!phone) return alert("Enter Number!");

            db.collection("customers").doc(phone).get().then(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('login-form').classList.add('hidden');
                    const dash = document.getElementById('dash-info');
                    dash.classList.remove('hidden');
                    dash.innerHTML = `
                        <h2 style="color:var(--primary)">Hello, ${data.name}</h2>
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--primary);">
                            <p>Current Status: <strong>${data.status}</strong></p>
                            <p>Warranty Until: <strong>${data.expiry}</strong></p>
                        </div>
                        <button class="btn-main" onclick="location.reload()" style="font-size:0.7rem;">LOGOUT / BACK</button>
                    `;
                } else { alert("No records found for this number in Hafar Al Batin database."); }
            });
        }
    </script>
</body>
</html>
