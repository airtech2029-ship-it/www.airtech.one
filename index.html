<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Hafar Al Batin Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #0f172a; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; }
        .submenu.active { max-height: 600px; }
        #productDisplay { transition: all 0.4s ease; opacity: 0; pointer-events: none; transform: scale(0.95); }
        #productDisplay.show { opacity: 1; pointer-events: auto; transform: scale(1); display: flex; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-white overflow-x-hidden">

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0f172a] z-[100] border-r border-blue-500/20 flex flex-col -translate-x-full shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
            <div>
                <h2 class="text-xl font-black text-blue-400 tracking-tighter uppercase">AirTech Catalog</h2>
                <div class="h-1 w-8 bg-blue-600 mt-1"></div>
            </div>
            <button onclick="togglePanel()" class="text-slate-400 text-3xl hover:text-white transition">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4">
            <div class="bg-slate-900/40 rounded-2xl border border-slate-800/50">
                <button onclick="toggleAccordion('hik-menu', 'hik-icon')" class="w-full flex items-center justify-between p-4 outline-none">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest">Hikvision Solutions</span>
                    <i class="fas fa-chevron-down text-[10px] text-slate-500 transition-transform" id="hik-icon"></i>
                </button>
                <div id="hik-menu" class="submenu">
                    <div class="px-4 pb-4 space-y-1 ml-4 border-l border-slate-800">
                        <button onclick="displayProducts('Hikvision NVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-blue-600/10 rounded-lg transition">NVR System</button>
                        <button onclick="displayProducts('Hikvision DVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-blue-600/10 rounded-lg transition">DVR System</button>
                        <button onclick="displayProducts('Hikvision IP Outdoor')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-blue-600/10 rounded-lg transition">IP Camera Outdoor</button>
                        <button onclick="displayProducts('Hikvision Analog Outdoor')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-blue-600/10 rounded-lg transition">Analog Camera Outdoor</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-2xl border border-slate-800/50">
                <button onclick="toggleAccordion('dahua-menu', 'dahua-icon')" class="w-full flex items-center justify-between p-4 outline-none">
                    <span class="text-xs font-black text-orange-400 uppercase tracking-widest">Dahua Technology</span>
                    <i class="fas fa-chevron-down text-[10px] text-slate-500 transition-transform" id="dahua-icon"></i>
                </button>
                <div id="dahua-menu" class="submenu">
                    <div class="px-4 pb-4 space-y-1 ml-4 border-l border-slate-800">
                        <button onclick="displayProducts('Dahua NVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-orange-600/10 rounded-lg transition">Dahua NVR</button>
                        <button onclick="displayProducts('Dahua DVR')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-orange-600/10 rounded-lg transition">Dahua DVR</button>
                        <button onclick="displayProducts('Dahua IP Camera')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-orange-600/10 rounded-lg transition">IP Camera</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-2xl border border-slate-800/50">
                <button onclick="toggleAccordion('hdd-menu', 'hdd-icon')" class="w-full flex items-center justify-between p-4 outline-none">
                    <span class="text-xs font-black text-purple-400 uppercase tracking-widest">HDD Store</span>
                    <i class="fas fa-chevron-down text-[10px] text-slate-500 transition-transform" id="hdd-icon"></i>
                </button>
                <div id="hdd-menu" class="submenu">
                    <div class="px-4 pb-4 space-y-1 ml-4 border-l border-slate-800">
                        <button onclick="displayProducts('WD Purple')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-purple-600/10 rounded-lg transition">WD Purple</button>
                        <button onclick="displayProducts('Toshiba HDD')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-purple-600/10 rounded-lg transition">Toshiba S300</button>
                        <button onclick="displayProducts('Seagate HDD')" class="w-full text-left p-3 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-purple-600/10 rounded-lg transition">Seagate SkyHawk</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-6 bg-slate-900 border-t border-slate-800">
            <a href="https://wa.me/966500000000" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition">
                <i class="fab fa-whatsapp text-xl"></i> CONTACT ASIM
            </a>
        </div>
    </div>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[90]"></div>
    
    <nav class="p-6 flex justify-between items-center bg-[#0f172a] border-b border-slate-800 sticky top-0 z-[80]">
        <button onclick="togglePanel()" class="w-12 h-12 flex items-center justify-center bg-slate-800 rounded-2xl text-blue-400">
            <i class="fas fa-bars text-xl"></i>
        </button>
        <div class="text-2xl font-black text-white tracking-tighter uppercase">AirTech One</div>
        <div class="w-12"></div>
    </nav>

    <main class="p-8 text-center flex flex-col items-center justify-center min-h-[70vh]">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-6 uppercase tracking-tighter leading-none">Security<br><span class="text-blue-600">Reimagined</span></h1>
        <p class="text-slate-400 max-w-lg mb-10 text-lg">Your premium destination for Hikvision, Dahua, and Storage solutions in Hafar Al Batin.</p>
        <button onclick="togglePanel()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-3xl font-black shadow-2xl shadow-blue-500/20 transition-all transform hover:-translate-y-1">OPEN SMART CATALOG</button>
    </main>

    <div id="productDisplay" class="fixed inset-0 bg-[#0f172a] z-[120] hidden flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h3 id="catTitle" class="text-3xl font-black text-blue-400 uppercase tracking-tighter leading-none">Category</h3>
                <p id="catCount" class="text-[10px] text-slate-500 uppercase tracking-widest mt-2 font-bold">Premium Inventory Selection</p>
            </div>
            <button onclick="closeProductView()" class="h-14 w-14 bg-slate-800 rounded-3xl flex items-center justify-center text-3xl text-slate-400 hover:text-white transition shadow-xl">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div id="gridBody" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div class="mt-12 py-12 text-center border-t border-slate-800">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em]">Hafar Al Batin | AirTech One Official Catalog</p>
        </div>
    </div>

    <script>
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            const overlay = document.getElementById('overlay');
            const isOpen = !panel.classList.contains('-translate-x-full');
            if (isOpen) {
                panel.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                panel.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        function toggleAccordion(menuId, iconId) {
            const menu = document.getElementById(menuId);
            const icon = document.getElementById(iconId);
            const isActive = menu.classList.contains('active');
            if (!isActive) {
                menu.classList.add('active');
                icon.style.transform = 'rotate(180deg)';
            } else {
                menu.classList.remove('active');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function displayProducts(category) {
            const display = document.getElementById('productDisplay');
            const grid = document.getElementById('gridBody');
            const title = document.getElementById('catTitle');
            
            // Sidebar band karo aur display kholo
            togglePanel();
            title.innerText = category;
            display.classList.remove('hidden');
            setTimeout(() => display.classList.add('show'), 10);

            // Dummy products based on category
            const items = [
                { name: category + " Ultra Pro", price: "850 SAR", detail: "4K Night Vision, AI Human Detection" },
                { name: category + " Business Grade", price: "1,200 SAR", specs: "High Reliability for Large Offices" },
                { name: category + " Starter Kit", price: "450 SAR", specs: "Easy Installation, Remote Viewing" }
            ];

            grid.innerHTML = items.map(p => `
                <div class="bg-slate-900/60 p-6 rounded-[2.5rem] border border-slate-800 hover:border-blue-500/50 transition-all group">
                    <div class="w-full h-48 bg-slate-800 rounded-[2rem] mb-6 flex items-center justify-center overflow-hidden relative">
                        <i class="fas fa-microchip text-5xl text-slate-700 group-hover:scale-110 transition-transform"></i>
                        <span class="absolute top-4 right-4 bg-blue-600 text-[8px] font-black px-3 py-1 rounded-full uppercase">Verified</span>
                    </div>
                    <h4 class="text-xl font-black mb-2 text-white group-hover:text-blue-400 transition-colors">${p.name}</h4>
                    <p class="text-slate-500 text-xs mb-6 leading-relaxed">Advanced ${category} solution designed for extreme surveillance environments and crystal clear imaging.</p>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-lg font-black text-blue-500">${p.price}</span>
                        <a href="https://wa.me/966500000000" class="bg-slate-800 hover:bg-blue-600 text-white text-[10px] font-black px-6 py-3 rounded-2xl uppercase tracking-widest transition-all">Order</a>
                    </div>
                </div>
            `).join('');
        }

        function closeProductView() {
            const display = document.getElementById('productDisplay');
            display.classList.remove('show');
            setTimeout(() => display.classList.add('hidden'), 400);
        }
    </script>
</body>
</html>
