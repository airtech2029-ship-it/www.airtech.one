<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One | Hafar Al Batin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a1120; color: white; overflow-x: hidden; }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .submenu.active { max-height: 2000px; }
        .side-panel { transition: transform 0.3s ease-in-out; }
        .vip-card { background: #161e31; border: 1px solid #232d45; border-radius: 20px; padding: 18px; transition: 0.3s; }
        .vip-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="sidePanel" class="side-panel fixed inset-y-0 left-0 w-80 bg-[#0d1629] z-[100] border-r border-slate-800 -translate-x-full flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h2 class="text-xl font-black text-blue-500 italic uppercase tracking-tighter">AIRTECH MENU</h2>
            <button onclick="togglePanel()" class="text-3xl text-slate-500">&times;</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-slate-900/40 rounded-2xl border border-slate-800">
                <button onclick="toggleAccordion('hik-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-blue-400 uppercase tracking-widest">Hikvision Solutions</span>
                    <i class="fas fa-chevron-down text-[10px] text-blue-500"></i>
                </button>
                <div id="hik-menu" class="submenu border-l border-blue-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('hikNvr')" class="block p-3 text-[11px] font-bold text-slate-400">NVR SYSTEM</a>
                    <a href="#" onclick="openProducts('hikDvr')" class="block p-3 text-[11px] font-bold text-slate-400">DVR SYSTEM</a>
                    <a href="#" onclick="openProducts('ezviz')" class="block p-3 text-[11px] font-bold text-blue-300 italic">EZVIZ WI-FI CAMERA</a>
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-2xl border border-slate-800">
                <button onclick="toggleAccordion('dahua-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-orange-400 uppercase tracking-widest">Dahua Technology</span>
                    <i class="fas fa-chevron-down text-[10px] text-orange-500"></i>
                </button>
                <div id="dahua-menu" class="submenu border-l border-orange-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('dahuaNvr')" class="block p-3 text-[11px] font-bold text-slate-400">NVR SYSTEM</a>
                    <a href="#" onclick="openProducts('dahuaDvr')" class="block p-3 text-[11px] font-bold text-slate-400">DVR SYSTEM</a>
                    <a href="#" onclick="openProducts('imou')" class="block p-3 text-[11px] font-bold text-orange-300 italic">IMOU WI-FI CAMERA</a>
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-2xl border border-slate-800">
                <button onclick="toggleAccordion('hdd-menu')" class="w-full flex items-center justify-between p-4">
                    <span class="text-[11px] font-black text-purple-400 uppercase tracking-widest">Storage & Network</span>
                    <i class="fas fa-chevron-down text-[10px] text-purple-500"></i>
                </button>
                <div id="hdd-menu" class="submenu border-l border-purple-500/20 ml-6 pb-2">
                    <a href="#" onclick="openProducts('wdHdd')" class="block p-3 text-[11px] font-bold text-slate-400">WD PURPLE HDD</a>
                    <a href="#" onclick="openProducts('toshibaHdd')" class="block p-3 text-[11px] font-bold text-slate-400">TOSHIBA HDD</a>
                    <a href="#" onclick="openProducts('tpLink')" class="block p-3 text-[11px] font-bold text-purple-300 uppercase">TP-LINK ROUTERS</a>
                    <a href="#" onclick="openProducts('tapo')" class="block p-3 text-[11px] font-bold text-purple-300 uppercase italic">TAPO SMART HOME</a>
                </div>
            </div>

            <div class="mt-auto border-t border-slate-800 pt-6 pb-4 px-4">
                <div onclick="openProducts('billzest')" class="flex items-center gap-3 p-3 bg-blue-600/5 rounded-xl border border-blue-500/10 hover:border-blue-500/40 cursor-pointer transition">
                    <div class="w-8 h-8 bg-blue-600/20 rounded-lg flex items-center justify-center"><i class="fas fa-crown text-blue-500 text-xs"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-[2px]">BillZest VIP</p>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Video POS System</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-[#0a1120] border-b border-slate-900 z-50">
        <button onclick="togglePanel()" class="w-10 h-10 bg-slate-900 rounded-lg flex items-center justify-center border border-slate-800"><i class="fas fa-bars text-blue-500"></i></button>
        <div class="text-xl font-black italic uppercase tracking-tighter">AIRTECH <span class="text-blue-600">ONE</span></div>
        <div class="flex items-center gap-3">
            <button class="text-[10px] font-bold text-slate-400 border border-slate-800 px-3 py-2 rounded-lg hover:bg-slate-800">العربية</button>
            <div class="w-10 h-10 bg-slate-900 rounded-lg flex items-center justify-center border border-slate-800 text-slate-500"><i class="fas fa-user-circle"></i></div>
        </div>
    </nav>

    <header class="py-32 px-6 text-center">
        <h1 class="text-6xl font-black uppercase italic mb-4 tracking-tighter">AIRTECH<br><span class="text-blue-600">ONE</span></h1>
        <p class="text-slate-500 text-sm italic uppercase tracking-widest">Hafar Al Batin Specialist</p>
    </header>

    <div id="fullView" class="fixed inset-0 bg-[#0a1120] z-[200] hidden flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0d1629]">
            <h2 id="catTitle" class="text-2xl font-black uppercase italic text-blue-500">Products</h2>
            <button onclick="closeFullView()" class="w-12 h-12 bg-slate-800 rounded-2xl text-2xl hover:bg-red-500/20 transition">&times;</button>
        </div>
        <div id="productGrid" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto"></div>
    </div>

    <footer class="mt-20 p-10 text-center border-t border-slate-900">
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[4px]">HAFAR AL BATIN | SAUDI ARABIA | 2026</p>
    </footer>

    <div id="overlay" onclick="togglePanel()" class="fixed inset-0 bg-black/80 hidden z-[90] backdrop-blur-sm"></div>

    <script>
        const catalog = {
            hikNvr: { title: "HIKVISION NVR", items: [{ model: '4-CH', name: 'DS-7604NI-K1 4K', price: '450', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/nvr/7600/7604NI-K1.png' }] },
            hikDvr: { title: "HIKVISION DVR", items: [{ model: '8-CH', name: 'DS-7208HGHI-K1', price: '320', img: 'https://www.hikvision.com/content/dam/hikvision/en/marketing-material/product-photos/dvr/7200/7208HGHI.png' }] },
            ezviz: { title: "EZVIZ WI-FI CAMERA", items: [
                { model: 'Indoor', name: 'Ezviz C6N Smart IP', price: '165', img: 'http://googleusercontent.com/image_collection/image_retrieval/8990992085306262255_0' },
                { model: 'Outdoor', name: 'Ezviz C3WN Wireless', price: '210', img: 'https://m.media-amazon.com/images/I/51H-D3U5k8L._AC_SL1000_.jpg' }
            ]},
            dahuaNvr: { title: "DAHUA NVR", items: [{ model: '4-CH', name: 'NVR4104HS-4KS2', price: '440', img: 'https://www.dahuasecurity.com/asset/upload/product/20180523/NVR4104HS-4KS2_thumb.png' }] },
            dahuaDvr: { title: "DAHUA DVR", items: [{ model: '8-CH', name: 'Dahua WizSense XVR', price: '310', img: 'https://www.dahuasecurity.com/asset/upload/product/20210331/XVR5104HS-I2_thumb.png' }] },
            imou: { title: "IMOU WI-FI CAMERA", items: [
                { model: 'Indoor', name: 'Imou Ranger 2 360', price: '145', img: 'http://googleusercontent.com/image_collection/image_retrieval/17594564920537744808_0' },
                { model: 'Outdoor', name: 'Imou Bullet 2C', price: '185', img: 'https://m.media-amazon.com/images/I/51pI-E9T3cL._AC_SL1500_.jpg' }
            ]},
            tpLink: { title: "TP-LINK DEVICES", items: [
                { model: 'Router', name: 'Archer C54 AC1200', price: '135', img: 'http://googleusercontent.com/image_collection/image_retrieval/334492989085222901_0' }
            ]},
            tapo: { title: "TAPO SMART HOME", items: [
                { model: 'Camera', name: 'Tapo C200 Pan/Tilt', price: '125', img: 'http://googleusercontent.com/image_collection/image_retrieval/10486097695225849254_0' }
            ]},
            wdHdd: { title: "WD PURPLE HDD", items: [{ model: '4TB', name: 'WD Purple Surveillance', price: '410', img: 'https://m.media-amazon.com/images/I/81sh9jG7tWL._AC_SL1500_.jpg' }] },
            toshibaHdd: { title: "TOSHIBA HDD", items: [{ model: '1TB', name: 'Toshiba Video Stream', price: '185', img: 'https://m.media-amazon.com/images/I/61MoyYl66fL._AC_SL1000_.jpg' }] }
        };

        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }
        function toggleAccordion(id) { document.getElementById(id).classList.toggle('active'); }
        function openProducts(key) {
            const data = catalog[key];
            if(!data) { alert("Updating list..."); return; }
            document.getElementById('catTitle').innerText = data.title;
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.items.map(i => `
                <div class="vip-card flex flex-col items-center">
                    <span class="self-start text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg font-bold mb-3">${i.model}</span>
                    <div class="w-full h-44 flex items-center justify-center bg-white rounded-2xl mb-4 p-4 shadow-inner">
                        <img src="${i.img}" alt="${i.name}" class="max-h-36 object-contain">
                    </div>
                    <h3 class="text-white font-bold text-[15px] uppercase tracking-tight text-center h-10 flex items-center">${i.name}</h3>
                    <div class="w-full mt-4 flex justify-between items-center border-t border-slate-800 pt-4">
                        <span class="text-xl font-black text-white">${i.price} <small class="text-[10px] text-blue-500 font-bold uppercase">SAR</small></span>
                        <a href="https://wa.me/966500000000" class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            `).join('');
            document.getElementById('fullView').style.display = 'flex';
            togglePanel();
        }
        function closeFullView() { document.getElementById('fullView').style.display = 'none'; }
    </script>
</body>
</html>
