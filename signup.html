<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .google-btn {
            background: white;
            color: #444;
            border: 2px solid #e0e0e0;
            margin-top: 10px;
        }
        .google-btn:hover {
            background: #f5f5f5;
            box-shadow: none;
            transform: none;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        
        <!-- Messages -->
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Registration Form -->
        <form id="registerForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter password (min 6 chars)" required minlength="6">

            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>

            <button type="submit" id="registerBtn">Register</button>
        </form>

        <button class="google-btn" id="googleLoginBtn">Login with Google</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // 🔥 FIREBASE CONFIGURATION - FIXED API KEY
        const firebaseConfig = {
            apiKey: "AIzaSyCjzr_7pP_yuBOiowOpGNRdDO", // API key from your Firebase console
            authDomain: "airtech-one-23985.firebaseapp.com",
            projectId: "airtech-one-23985",
            storageBucket: "airtech-one-23985.firebaseio.app",
            messagingSenderId: "132253722874",
            appId: "1:132253722874:web:34fe3484d24f"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized");
        } catch (error) {
            console.error("❌ Firebase error:", error);
        }

        // Get elements
        const registerForm = document.getElementById('registerForm');
        const googleBtn = document.getElementById('googleLoginBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
        }

        function showSuccess(msg) {
            successDiv.textContent = msg;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        // Handle Registration
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showError("Passwords don't match!");
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = "Creating Account...";

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: name });
                
                showSuccess("Registration successful! Welcome " + name);
                registerForm.reset();
            } catch (error) {
                let msg = "Registration failed: ";
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        msg += "Email already registered";
                        break;
                    case 'auth/weak-password':
                        msg += "Password too weak (min 6 chars)";
                        break;
                    default:
                        msg += error.message;
                }
                showError(msg);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = "Register";
            }
        });

        // Google Login
        googleBtn.addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await firebase.auth().signInWithPopup(provider);
                showSuccess("Google login successful!");
            } catch (error) {
                showError("Google login failed: " + error.message);
            }
        });
    </script>
</body>
</html>
