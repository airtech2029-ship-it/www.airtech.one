<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .google-btn:hover {
            background: #f5f5f5;
        }
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AirTech One</h1>
            <p>Create your account</p>
        </div>

        <!-- Error message display -->
        <div id="errorMessage" class="error-message"></div>
        
        <!-- Success message display -->
        <div id="successMessage" class="success-message"></div>

        <!-- Registration Form -->
        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">FULL NAME</label>
                <input type="text" id="fullName" placeholder="Enter your full name" value="UserTest" required>
            </div>

            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="Enter your email" value="actionvoiz2020@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="Enter your password" value="********" required minlength="6">
            </div>

            <button type="submit" class="register-btn" id="registerBtn">REGISTER</button>
        </form>

        <button class="google-btn" id="googleLoginBtn">
            <img src="https://www.google.com/favicon.ico" alt="Google">
            Google se Login
        </button>

        <div class="login-link">
            Already have an account? <a href="#">Login</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // 🔥 FIREBASE CONFIGURATION - API KEY ADDED ✅
        const firebaseConfig = {
            apiKey: "AIzaSyCjzr_7pP_yuBOiowOpGNRdDO", // API key added from your screenshot
            authDomain: "airtech-one-23985.firebaseapp.com",
            projectId: "airtech-one-23985",
            storageBucket: "airtech-one-23985.firebaseio.app",
            messagingSenderId: "132253722874",
            appId: "1:132253722874:web:34fe3484d24f"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("✅ Firebase initialized successfully!");
        } catch (error) {
            console.error("❌ Firebase initialization error:", error);
            showError("Firebase initialization failed: " + error.message);
        }

        // Get elements
        const registerForm = document.getElementById('registerForm');
        const googleBtn = document.getElementById('googleLoginBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');

        // Helper functions
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        function hideMessages() {
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
        }

        // Email/Password Registration
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!fullName || !email || !password) {
                showError("Please fill in all fields");
                return;
            }

            if (password.length < 6) {
                showError("Password must be at least 6 characters");
                return;
            }

            // Disable button to prevent double submission
            registerBtn.disabled = true;
            registerBtn.textContent = "Creating account...";

            try {
                // Create user with email and password
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                // Update profile with full name
                await userCredential.user.updateProfile({
                    displayName: fullName
                });

                console.log("✅ Registration successful:", userCredential.user.email);
                showSuccess("Registration successful! Welcome " + fullName);
                
                // Clear form
                registerForm.reset();
                
                // Optional: Redirect after 2 seconds
                // setTimeout(() => {
                //     window.location.href = "dashboard.html";
                // }, 2000);

            } catch (error) {
                console.error("❌ Registration error:", error);
                
                // Handle specific error codes
                let errorMessage = "Registration failed: ";
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += "Email already registered. Please login.";
                        break;
                    case 'auth/invalid-email':
                        errorMessage += "Invalid email address.";
                        break;
                    case 'auth/weak-password':
                        errorMessage += "Password too weak. Use at least 6 characters.";
                        break;
                    case 'auth/api-key-not-valid':
                        errorMessage += "API key invalid. Please check configuration.";
                        break;
                    default:
                        errorMessage += error.message;
                }
                showError(errorMessage);
            } finally {
                // Re-enable button
                registerBtn.disabled = false;
                registerBtn.textContent = "REGISTER";
            }
        });

        // Google Sign-In
        googleBtn.addEventListener('click', async () => {
            hideMessages();
            
            // Disable button
            googleBtn.disabled = true;
            googleBtn.textContent = "Connecting...";

            try {
                // Create Google provider
                const provider = new firebase.auth.GoogleAuthProvider();
                
                // Sign in with popup
                const result = await firebase.auth().signInWithPopup(provider);
                
                console.log("✅ Google login successful:", result.user.email);
                showSuccess("Google login successful! Welcome " + result.user.displayName);
                
                // Optional: Redirect after 2 seconds
                // setTimeout(() => {
                //     window.location.href = "dashboard.html";
                // }, 2000);

            } catch (error) {
                console.error("❌ Google login error:", error);
                
                let errorMessage = "Google login failed: ";
                switch (error.code) {
                    case 'auth/popup-closed-by-user':
                        errorMessage = "Login cancelled. Please try again.";
                        break;
                    case 'auth/popup-blocked':
                        errorMessage = "Popup blocked. Please allow popups for this site.";
                        break;
                    case 'auth/api-key-not-valid':
                        errorMessage += "API key invalid. Please check configuration.";
                        break;
                    default:
                        errorMessage += error.message;
                }
                showError(errorMessage);
            } finally {
                // Re-enable button
                googleBtn.disabled = false;
                googleBtn.textContent = "Google se Login";
            }
        });

        // Check if user is already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                console.log("👤 User is logged in:", user.email);
                // You can show logged-in state here
                // showSuccess("Logged in as: " + user.email);
            } else {
                console.log("👤 No user logged in");
            }
        });
    </script>
</body>
</html>
