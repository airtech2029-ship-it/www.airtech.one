<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Manager — AIRTECH ONE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050810;--bg2:#080c16;--surface:#0d1424;--surface2:#121a2e;
  --border:#1c2d4a;--border2:#243652;
  --gold:#c9a96e;--gold2:#e8c98a;--gold3:#f5e0b0;
  --goldfaint:rgba(201,169,110,0.08);
  --text:#eef2f8;--text2:#8ba4c2;--text3:#445e7a;
  --red:#e05c6e;--green:#3ecf8e;--yellow:#e8b84b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:900;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(5,8,16,0.97);backdrop-filter:blur(28px);border-bottom:1px solid rgba(201,169,110,0.12);}
.top-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;}
.top-logo em{color:var(--gold);font-style:normal;}
.top-logo small{font-family:'Outfit',sans-serif;font-size:.6rem;color:var(--text3);letter-spacing:.16em;text-transform:uppercase;display:block;margin-top:1px;}
.top-right{display:flex;align-items:center;gap:.75rem;}
.top-btn{background:var(--surface);border:1px solid var(--border);color:var(--text3);cursor:pointer;padding:7px 14px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px;}
.top-btn:hover{border-color:rgba(201,169,110,0.3);color:var(--gold);}
.save-all-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#050810;border:none;cursor:pointer;padding:8px 18px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;gap:6px;}
.save-all-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(201,169,110,0.28);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;padding-top:64px;}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid rgba(201,169,110,0.08);padding:1.5rem 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
.sidebar-section{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.16em;font-weight:600;padding:.5rem 1.25rem;margin-top:1rem;}
.brand-btn{display:flex;align-items:center;gap:.6rem;padding:9px 1.25rem;cursor:pointer;color:var(--text3);font-size:.8rem;font-weight:500;transition:all .2s;border-left:2px solid transparent;border-radius:0;}
.brand-btn:hover{color:var(--text2);background:rgba(201,169,110,0.04);}
.brand-btn.active{color:var(--gold);border-left-color:var(--gold);background:var(--goldfaint);}
.brand-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.brand-count{margin-left:auto;font-size:.65rem;color:var(--text3);background:var(--surface);padding:2px 7px;border-radius:50px;}

/* MAIN */
.main{padding:2rem;}
.brand-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;}
.brand-title-row{display:flex;align-items:center;gap:.75rem;}
.brand-icon{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:700;color:#050810;}
.brand-heading{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:.04em;}
.brand-heading em{font-style:italic;color:var(--gold2);}
.brand-sub{font-size:.72rem;color:var(--text3);margin-top:1px;}
.header-actions{display:flex;gap:.6rem;}
.add-btn{background:var(--goldfaint);border:1px solid rgba(201,169,110,0.25);color:var(--gold);cursor:pointer;padding:8px 16px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;gap:6px;}
.add-btn:hover{background:var(--gold);color:#050810;}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s;}
.prod-card:hover{border-color:rgba(201,169,110,0.2);}
.prod-img-wrap{position:relative;height:170px;overflow:hidden;background:var(--surface2);}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;filter:brightness(.8);transition:all .3s;}
.prod-card:hover .prod-img-wrap img{filter:brightness(.9);}
.img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;opacity:0;transition:all .2s;}
.prod-card:hover .img-overlay{background:rgba(0,0,0,.5);opacity:1;}
.img-btn{background:rgba(5,8,16,0.85);border:1px solid rgba(201,169,110,0.3);color:var(--gold);cursor:pointer;padding:7px 14px;border-radius:4px;font-family:'Outfit',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;}
.img-btn:hover{background:var(--gold);color:#050810;}
.badge-wrap{position:absolute;top:8px;left:8px;}
.badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;}
.b-hot{background:var(--red);color:#fff;}
.b-new{background:var(--gold);color:#050810;}
.b-pro{background:var(--surface2);border:1px solid var(--gold);color:var(--gold2);}
.b-sale{background:var(--green);color:#050810;}
.prod-body{padding:1.1rem 1.2rem 1.2rem;}
.prod-fields{display:flex;flex-direction:column;gap:.6rem;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.field-group{display:flex;flex-direction:column;gap:3px;}
.field-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;}
.field-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s;width:100%;}
.field-input:focus{border-color:rgba(201,169,110,0.35);}
.field-input::placeholder{color:var(--text3);}
.price-input{color:var(--gold2);font-weight:600;}
.badge-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-family:'Outfit',sans-serif;font-size:.78rem;outline:none;cursor:pointer;width:100%;appearance:none;}
.badge-select option{background:var(--surface2);}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border);}
.save-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#050810;border:none;cursor:pointer;padding:7px 16px;border-radius:4px;font-family:'Outfit',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,169,110,0.28);}
.delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;font-family:'Outfit',sans-serif;}
.delete-btn:hover{color:var(--red);}
.saved-indicator{font-size:.65rem;color:var(--green);display:none;align-items:center;gap:4px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid rgba(201,169,110,0.2);border-radius:16px;padding:2rem;width:100%;max-width:480px;animation:popIn .3s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:1.5rem;letter-spacing:.04em;}
.modal-title em{font-style:italic;color:var(--gold2);}
.modal-field{margin-bottom:1rem;}
.modal-label{display:block;font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;font-weight:600;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:7px;font-family:'Outfit',sans-serif;font-size:.87rem;outline:none;transition:border-color .2s;}
.modal-input:focus{border-color:rgba(201,169,110,0.35);}
.modal-input::placeholder{color:var(--text3);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.url-preview{width:100%;height:120px;object-fit:cover;border-radius:7px;margin-top:.5rem;border:1px solid var(--border);background:var(--surface2);display:block;}
.modal-footer{display:flex;gap:.75rem;margin-top:1.5rem;}
.modal-save{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#050810;border:none;cursor:pointer;padding:12px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;}
.modal-save:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(201,169,110,0.28);}
.modal-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:12px 20px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;transition:all .2s;}
.modal-cancel:hover{border-color:var(--border2);color:var(--text);}

/* TOAST */
.toast{position:fixed;bottom:1.75rem;right:1.75rem;z-index:99999;background:var(--surface);border:1px solid rgba(201,169,110,0.25);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:.82rem;box-shadow:0 16px 40px rgba(0,0,0,.5);transform:translateX(140%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.toast.show{transform:translateX(0);}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.4;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;display:flex;overflow-x:auto;padding:.75rem 1rem;gap:.5rem;border-right:none;border-bottom:1px solid rgba(201,169,110,0.08);}
  .sidebar-section{display:none;}
  .brand-btn{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;border-radius:50px;padding:7px 14px;}
  .brand-btn.active{border-left:none;border-bottom-color:var(--gold);}
  .main{padding:1.25rem;}
  .products-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="top-logo"><em>AIRTECH</em> ONE<small>Product Manager</small></div>
  <div class="top-right">

      View Site
    </a>

      Dashboard
    </a>
    <button class="save-all-btn" onclick="saveAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save All
    </button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="brand-header">
      <div class="brand-title-row">
        <div class="brand-icon" id="brandIcon">HK</div>
        <div>
          <div class="brand-heading" id="brandHeading">HiKvision <em>Products</em></div>
          <div class="brand-sub" id="brandSub">6 products • Click any field to edit</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="add-btn" onclick="openAddModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Product
        </button>
      </div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal-overlay" id="imgModal">
  <div class="modal">
    <div class="modal-title">Change <em>Product Image</em></div>
    <div class="modal-field">
      <label class="modal-label">Image URL</label>
      <input class="modal-input" id="imgUrlInput" placeholder="https://images.unsplash.com/..." oninput="previewImg()"/>
      <img id="imgPreview" class="url-preview" src="" style="display:none"/>
    </div>
    <div class="modal-field">
      <label class="modal-label">Or paste any image URL from web</label>
      <p style="font-size:.72rem;color:var(--text3);line-height:1.6;">Copy image URL from Google Images, Unsplash, or any website and paste above.</p>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeImgModal()">Cancel</button>
      <button class="modal-save" onclick="applyImg()">Apply Image</button>
    </div>
  </div>
</div>

<!-- ADD PRODUCT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Add <em>New Product</em></div>
    <div class="modal-field">
      <label class="modal-label">Product Name *</label>
      <input class="modal-input" id="addName" placeholder="e.g. 4MP Bullet Camera"/>
    </div>
    <div class="modal-grid">
      <div class="modal-field">
        <label class="modal-label">Model</label>
        <input class="modal-input" id="addModel" placeholder="e.g. DS-2CD2T47"/>
      </div>
      <div class="modal-field">
        <label class="modal-label">Price ($) *</label>
        <input class="modal-input" id="addPrice" type="number" placeholder="199"/>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Description</label>
      <input class="modal-input" id="addDesc" placeholder="Short product description..."/>
    </div>
    <div class="modal-grid">
      <div class="modal-field">
        <label class="modal-label">Badge</label>
        <select class="modal-input" id="addBadge" style="cursor:pointer;appearance:none;">
          <option value="">None</option>
          <option value="New">New</option>
          <option value="Hot">Hot</option>
          <option value="Pro">Pro</option>
          <option value="Sale">Sale</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Image URL</label>
      <input class="modal-input" id="addImg" placeholder="https://images.unsplash.com/..." oninput="previewAddImg()"/>
      <img id="addImgPreview" class="url-preview" src="" style="display:none"/>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="modal-save" onclick="addProduct()">Add Product</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="tdot"></div><span id="toastMsg"></span></div>

// Load saved data from localStorage
function loadData(){
  Object.keys(brandsData).forEach(key=>{
    const saved = localStorage.getItem('products_'+key);
    if(saved){
      try{ brandsData[key].products = JSON.parse(saved); }catch(e){}
    }
  });
}

let currentBrand = 'hikvision';
let editingImgTarget = null;
let nextId = 100;

function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-section">Brands</div>' +
    Object.entries(brandsData).map(([key,b])=>`
      <div class="brand-btn ${key===currentBrand?'active':''}" onclick="switchBrand('${key}')">
        <div class="brand-dot" style="background:${b.color}"></div>
        ${b.label}
        <span class="brand-count">${b.products.length}</span>
      </div>
    `).join('');
}

function switchBrand(key){
  currentBrand = key;
  buildSidebar();
  renderBrand();
}

function renderBrand(){
  const b = brandsData[currentBrand];
  document.getElementById('brandIcon').textContent = b.initials;
  document.getElementById('brandHeading').innerHTML = `${b.label} <em>Products</em>`;
  document.getElementById('brandSub').textContent = `${b.products.length} products • Click any field to edit`;

  const grid = document.getElementById('productsGrid');
  if(b.products.length===0){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📦</div><p>No products yet. Click "Add Product" to start.</p></div>`;
    return;
  }
  grid.innerHTML = b.products.map((p,i)=>`
    <div class="prod-card" id="card-${p.id}">
      <div class="prod-img-wrap">
        <img id="img-${p.id}" src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=500&q=80'"/>
        <div class="img-overlay">
          <button class="img-btn" onclick="openImgModal(${p.id})">
            📷 Change Photo
          </button>
        </div>
        <div class="badge-wrap">
          ${p.badge?`<span class="badge b-${p.badge.toLowerCase()}">${p.badge}</span>`:''}
        </div>
      </div>
      <div class="prod-body">
        <div class="prod-fields">
          <div class="field-group">
            <label class="field-label">Product Name</label>
            <input class="field-input" id="name-${p.id}" value="${p.name}" placeholder="Product name"/>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Model</label>
              <input class="field-input" id="model-${p.id}" value="${p.model}" placeholder="Model no."/>
            </div>
            <div class="field-group">
              <label class="field-label">Price ($)</label>
              <input class="field-input price-input" id="price-${p.id}" type="number" value="${p.price}" placeholder="0"/>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Description</label>
            <input class="field-input" id="desc-${p.id}" value="${p.desc}" placeholder="Short description"/>
          </div>
          <div class="field-group">
            <label class="field-label">Badge</label>
            <select class="badge-select" id="badge-${p.id}">
              <option value="" ${!p.badge?'selected':''}>None</option>
              <option value="New" ${p.badge==='New'?'selected':''}>New</option>
              <option value="Hot" ${p.badge==='Hot'?'selected':''}>Hot</option>
              <option value="Pro" ${p.badge==='Pro'?'selected':''}>Pro</option>
              <option value="Sale" ${p.badge==='Sale'?'selected':''}>Sale</option>
            </select>
          </div>
        </div>
        <div class="card-footer">
          <button class="delete-btn" onclick="deleteProduct(${p.id})">✕ Delete</button>
          <div class="saved-indicator" id="saved-${p.id}">✓ Saved</div>
          <button class="save-btn" onclick="saveProduct(${p.id})">Save</button>
        </div>
      </div>
    </div>
  `).join('');
}

function saveProduct(id){
  const b = brandsData[currentBrand];
  const p = b.products.find(x=>x.id===id);
  if(!p) return;
  p.name = document.getElementById('name-'+id).value;
  p.model = document.getElementById('model-'+id).value;
  p.price = parseFloat(document.getElementById('price-'+id).value)||0;
  p.desc = document.getElementById('desc-'+id).value;
  p.badge = document.getElementById('badge-'+id).value || null;
  localStorage.setItem('products_'+currentBrand, JSON.stringify(b.products));
  const ind = document.getElementById('saved-'+id);
  ind.style.display='flex';
  setTimeout(()=>ind.style.display='none',2000);
  showToast('✓ Product saved!');
}

function saveAll(){
  Object.keys(brandsData).forEach(key=>{
    localStorage.setItem('products_'+key, JSON.stringify(brandsData[key].products));
  });
  showToast('✓ All products saved!');
}

function deleteProduct(id){
  if(!confirm('Delete this product?')) return;
  const b = brandsData[currentBrand];
  b.products = b.products.filter(p=>p.id!==id);
  localStorage.setItem('products_'+currentBrand, JSON.stringify(b.products));
  renderBrand();
  buildSidebar();
  showToast('Product deleted');
}

// IMAGE MODAL
function openImgModal(id){
  editingImgTarget = id;
  document.getElementById('imgUrlInput').value = '';
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgModal').classList.add('open');
}
function closeImgModal(){
  document.getElementById('imgModal').classList.remove('open');
  editingImgTarget = null;
}
function previewImg(){
  const url = document.getElementById('imgUrlInput').value.trim();
  const prev = document.getElementById('imgPreview');
  if(url){prev.src=url;prev.style.display='block';}
  else{prev.style.display='none';}
}
function applyImg(){
  const url = document.getElementById('imgUrlInput').value.trim();
  if(!url){showToast('Please enter an image URL');return;}
  const b = brandsData[currentBrand];
  const p = b.products.find(x=>x.id===editingImgTarget);
  if(p){
    p.img = url;
    const imgEl = document.getElementById('img-'+editingImgTarget);
    if(imgEl) imgEl.src = url;
    localStorage.setItem('products_'+currentBrand, JSON.stringify(b.products));
    showToast('✓ Image updated!');
  }
  closeImgModal();
}

// ADD MODAL
function openAddModal(){
  document.getElementById('addName').value='';
  document.getElementById('addModel').value='';
  document.getElementById('addPrice').value='';
  document.getElementById('addDesc').value='';
  document.getElementById('addBadge').value='';
  document.getElementById('addImg').value='';
  document.getElementById('addImgPreview').style.display='none';
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('open');
}
function previewAddImg(){
  const url = document.getElementById('addImg').value.trim();
  const prev = document.getElementById('addImgPreview');
  if(url){prev.src=url;prev.style.display='block';}
  else{prev.style.display='none';}
}
function addProduct(){
  const name = document.getElementById('addName').value.trim();
  const price = parseFloat(document.getElementById('addPrice').value)||0;
  if(!name||!price){showToast('Name and Price are required');return;}
  const newProd = {
    id: nextId++,
    name,
    model: document.getElementById('addModel').value.trim(),
    price,
    desc: document.getElementById('addDesc').value.trim(),
    badge: document.getElementById('addBadge').value||null,
    img: document.getElementById('addImg').value.trim()||'https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=500&q=80'
  };
  brandsData[currentBrand].products.push(newProd);
  localStorage.setItem('products_'+currentBrand, JSON.stringify(brandsData[currentBrand].products));
  closeAddModal();
  renderBrand();
  buildSidebar();
  showToast('✓ Product added!');
}

function showToast(msg){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  el.classList.add('show');
  clearTimeout(window._t);
  window._t=setTimeout(()=>el.classList.remove('show'),2800);
}

// Close modals on overlay click
document.getElementById('imgModal').addEventListener('click',function(e){if(e.target===this)closeImgModal();});
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

// INIT
loadData();
buildSidebar();
renderBrand();
</script>
