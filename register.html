<script>
// FIREBASE CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyCjz_7pP_yuBOiwOpGNRdDO",
    authDomain: "airtech-one-23985.firebaseapp.com",
    projectId: "airtech-one-23985",
    storageBucket: "airtech-one-23985.firebasestorage.app",
    messagingSenderId: "132253722874",
    appId: "1:132253722874:web:34fe348d24fec8757d4143",
    measurementId: "G-QW7BV7NFRD"
};

// Initialize Firebase
try {
    firebase.initializeApp(firebaseConfig);
    console.log("✅ Firebase initialized successfully!");
} catch (error) {
    console.error("❌ Firebase init error:", error);
}

// Get elements
const registerForm = document.getElementById('registerForm');
const googleBtn = document.getElementById('googleLoginBtn');
const errorDiv = document.getElementById('errorMessage');
const successDiv = document.getElementById('successMessage');
const registerBtn = document.getElementById('registerBtn');

function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.classList.add('show');
    successDiv.classList.remove('show');
}

function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.classList.add('show');
    errorDiv.classList.remove('show');
}

// Email/Password Registration
registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;

    if (!name || !email || !password) {
        showError("All fields are required!");
        return;
    }

    if (password !== confirmPassword) {
        showError("Passwords don't match!");
        return;
    }

    if (password.length < 6) {
        showError("Password must be at least 6 characters!");
        return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = "Creating Account...";

    try {
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        await userCredential.user.updateProfile({ displayName: name });
        
        showSuccess("✅ Registration successful! Welcome " + name);
        registerForm.reset();
        
    } catch (error) {
        console.error("Registration error:", error);
        
        let msg = "Registration failed: ";
        switch(error.code) {
            case 'auth/email-already-in-use':
                msg += "This email is already registered";
                break;
            case 'auth/invalid-email':
                msg += "Invalid email address";
                break;
            case 'auth/weak-password':
                msg += "Password should be at least 6 characters";
                break;
            default:
                msg += error.message;
        }
        showError(msg);
    } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = "Register";
    }
});

// Google Sign-In
googleBtn.addEventListener('click', async () => {
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
        showSuccess("✅ Google login successful!");
    } catch (error) {
        console.error("Google login error:", error);
        
        let msg = "Google login failed: ";
        if (error.code === 'auth/popup-closed-by-user') {
            msg = "Login cancelled. Please try again.";
        } else if (error.code === 'auth/popup-blocked') {
            msg = "Popup blocked. Please allow popups for this site.";
        } else {
            msg += error.message;
        }
        showError(msg);
    }
});
</script>
