<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTech One - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #4158D0; background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 2px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0; }
        .google-btn { background: white; color: #444; border: 2px solid #ddd; }
        .error-message { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success-message { background: #e8f5e8; color: #2e7d32; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="registerForm">
            <label>Name:</label>
            <input type="text" id="name" placeholder="Full name" required>
            
            <label>Email:</label>
            <input type="email" id="email" placeholder="Email address" required>
            
            <label>Password:</label>
            <input type="password" id="password" placeholder="Password (min 6 chars)" required minlength="6">
            
            <label>Confirm Password:</label>
            <input type="password" id="confirm_password" placeholder="Confirm password" required>
            
            <button type="submit" id="registerBtn">Register</button>
        </form>
        
        <button class="google-btn" id="googleLoginBtn">Login with Google</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCjz_7pP_yuBOiwOpGNRdDO",
        authDomain: "airtech-one-23985.firebaseapp.com",
        projectId: "airtech-one-23985",
        storageBucket: "airtech-one-23985.firebasestorage.app",
        messagingSenderId: "132253722874",
        appId: "1:132253722874:web:34fe348d24fec8757d4143"
    };

    firebase.initializeApp(firebaseConfig);
    console.log("Firebase OK");

    const registerForm = document.getElementById('registerForm');
    const googleBtn = document.getElementById('googleLoginBtn');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    const registerBtn = document.getElementById('registerBtn');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if(password !== confirm) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = "Passwords don't match!";
            return;
        }

        try {
            const user = await firebase.auth().createUserWithEmailAndPassword(email, password);
            await user.user.updateProfile({ displayName: name });
            successDiv.style.display = 'block';
            successDiv.textContent = "✅ Welcome " + name;
            errorDiv.style.display = 'none';
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = error.message;
        }
    });

    googleBtn.addEventListener('click', async () => {
        try {
            await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
            successDiv.style.display = 'block';
            successDiv.textContent = "✅ Google login successful!";
            errorDiv.style.display = 'none';
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = error.message;
        }
    });
    </script>
</body>
</html>
