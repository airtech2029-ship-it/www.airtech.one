<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | AirTech.One</title>
    
    <!-- 🔥 FIREBASE ADD KAREIN - YEH PART 1 -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    
    <!-- Firebase Config - YEH PART 2 -->
    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBgCHdnJ4XvQbin_SWEeqyGjqM_jDd3RXs",
            authDomain: "airtech-one-23985.firebaseapp.com",
            projectId: "airtech-one-23985",
            storageBucket: "airtech-one-23985.firebasestorage.app",
            messagingSenderId: "132253722874",
            appId: "1:132253722874:ios:839d4eeb100eda137d4143"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>
    
    <!-- Aapka existing style yahan rahega -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0B2A4A 0%, #1B4A6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* Baki styles yahan continue */
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="panel panel-default">
                    <div class="panel-heading">Login</div>
                    <div class="panel-body">
                        
                        <!-- 🔥 FORM MEIN YEH BADLAV KAREIN -->
                        <!-- onsubmit add karein aur action/method hataein -->
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="email">Email:</label>  <!-- username se change kiya -->
                                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                            </div>
                            <div class="form-group">
                                <label for="password">Password:</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>
                            
                            <!-- Signup link add karein -->
                            <div style="text-align: center; margin-top: 15px;">
                                Don't have an account? <a href="signup.html">Sign up here</a>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 🔥 JAVASCRIPT ADD KAREIN - FORM KE BAAD -->
    <script>
        function handleLogin(event) {
            event.preventDefault(); // Form ko submit hone se rokein
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Firebase se login
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Login successful
                    alert('Login successful! Welcome back!');
                    window.location.href = 'index.html'; // ya dashboard page
                })
                .catch((error) => {
                    // Error handling
                    let errorMessage = '';
                    switch(error.code) {
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address';
                            break;
                        case 'auth/user-not-found':
                            errorMessage = 'No account found with this email';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'Incorrect password';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    alert('Error: ' + errorMessage);
                });
        }
    </script>
    
</body>
</html>
