<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | AirTech.One</title>
    
    <!-- Firebase SDK - SAHI VERSION -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    
    <!-- Firebase Config - EXACT VALUES -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgCHdnJ4XvQbin_SWEeqyGjqM_jDd3RXs",
            authDomain: "airtech-one-23985.firebaseapp.com",
            projectId: "airtech-one-23985",
            storageBucket: "airtech-one-23985.firebasestorage.app",
            messagingSenderId: "132253722874",
            appId: "1:132253722874:ios:839d4eeb100eda137d4143"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0B2A44 0%, #1B4A6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 440px;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 45px 40px;
            box-shadow: 0 30px 60px rgba(0, 20, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 36px;
            font-weight: 700;
            color: #0B2A44;
            margin-bottom: 8px;
        }
        
        .logo span {
            color: #FF6B35;
        }
        
        h2 {
            color: #2C4050;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #2C4050;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E1E9F0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        input:focus {
            border-color: #0B2A44;
            outline: none;
            box-shadow: 0 0 0 4px rgba(11, 42, 68, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0B2A44, #1B4A6B);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(11, 42, 68, 0.2);
        }
        
        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        
        .signup-link a {
            color: #0B2A44;
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">AirTech<span>.One</span></div>
                <h2>Welcome Back</h2>
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn">Login</button>
                
                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Sign up here</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert('Login successful!');
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    let errorMessage = '';
                    switch(error.code) {
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address';
                            break;
                        case 'auth/user-not-found':
                            errorMessage = 'No account found with this email';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'Incorrect password';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    alert('Error: ' + errorMessage);
                });
        }
    </script>
</body>
</html>
