<head>

<style>
:root{
  --bg:#050810;--bg2:#080c16;--surface:#0d1424;--surface2:#121a2e;
  --border:#1c2d4a;--gold:#c9a96e;--gold2:#e8c98a;--gold3:#f5e0b0;
  --goldfaint:rgba(201,169,110,0.08);
  --text:#eef2f8;--text2:#8ba4c2;--text3:#445e7a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:2rem;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px 200px;pointer-events:none;}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(201,169,110,0.06) 0%,transparent 60%);pointer-events:none;}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(201,169,110,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);pointer-events:none;}
.content{position:relative;z-index:1;text-align:center;max-width:600px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:3rem;text-decoration:none;display:block;}
.logo em{color:var(--gold);font-style:normal;}
.error-num{font-family:'Cormorant Garamond',serif;font-size:clamp(6rem,20vw,12rem);font-weight:300;line-height:1;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;animation:fadeUp .7s ease both;}
.error-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:300;color:var(--text2);margin-bottom:1rem;animation:fadeUp .7s ease .1s both;}
.error-desc{font-size:.88rem;color:var(--text3);line-height:1.8;max-width:400px;margin:0 auto 2.5rem;font-weight:300;animation:fadeUp .7s ease .2s both;}
.btn-group{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;animation:fadeUp .7s ease .3s both;}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#050810;padding:13px 28px;border-radius:4px;text-decoration:none;font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;transition:all .3s;display:inline-block;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,169,110,0.28);}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border);padding:13px 24px;border-radius:4px;text-decoration:none;font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;transition:all .3s;display:inline-block;}
.btn-s:hover{border-color:rgba(201,169,110,0.3);color:var(--gold2);}
.quick-links{margin-top:3rem;animation:fadeUp .7s ease .4s both;}
.quick-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.18em;color:var(--text3);margin-bottom:1rem;}
.quick-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;}
.quick-link{background:var(--surface);border:1px solid var(--border);color:var(--text3);text-decoration:none;padding:.5rem 1rem;border-radius:50px;font-size:.72rem;transition:all .2s;}
.quick-link:hover{border-color:rgba(201,169,110,0.3);color:var(--gold);}
.decoration{position:fixed;font-family:'Cormorant Garamond',serif;font-size:20rem;font-weight:700;color:rgba(201,169,110,0.015);pointer-events:none;user-select:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;z-index:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="grid"></div>
<div class="decoration">404</div>
<div class="content">

      <a class="quick-link" href="contact.html">Contact</a>
      <a class="quick-link" href="about.html">About</a>
    </div>
  </div>
</div>
</body>
</html>
